<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">

<style>
  :root{
    --p:#4f6bf0; --pd:#3a52d6; --psoft:#e6eaff; --ptint:#eef1ff;
    --bg:#eef1ff; --ink:#20254f; --mut:#5b6090; --faint:#7e84bd;
    --line:#dde2ff; --card:#ffffff; --edge:#c9d0f5;
    --y:#ffd43b; --yd:#e6b800; --co:#ff8787; --cod:#e86b6b;
    --good:#1faf6a; --goodd:#178a54; --goodsoft:#ddf5ea;
    --bad:#ef5b6b; --badsoft:#ffe5e8;
    --sh:0 14px 26px -16px rgba(45,50,115,.34);
    --maxw:460px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Cairo','Tajawal',system-ui,'Segoe UI',sans-serif;
    color:var(--ink); background:#c9cffa; font-weight:600;
    background-image:radial-gradient(120% 120% at 100% 0,#dfe4ff 0,#c9cffa 60%);
    display:flex; align-items:stretch; justify-content:center;
    -webkit-font-smoothing:antialiased; overscroll-behavior:none;
    touch-action:manipulation;   /* disable double-tap zoom (keeps pinch-zoom) so the fixed bottom nav doesn't jump */
  }
  .en{font-family:'Inter',system-ui,sans-serif; direction:ltr; unicode-bidi:isolate}
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit}
  input{font-family:inherit}
  #app{
    width:100%; max-width:var(--maxw); min-height:100dvh; height:100dvh;
    background:var(--bg); position:relative; overflow:hidden;
    display:flex; flex-direction:column;
    touch-action:manipulation;

    box-shadow:0 40px 80px -30px rgba(30,28,70,.5);
  }
  @supports not (height:100dvh){ #app{height:100vh} }
  .scr{position:relative; z-index:1; flex:1; min-height:0; display:flex; flex-direction:column}
  .blobs{position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none}
  .blob{position:absolute; border-radius:50%}
  .scroll{overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  /* In a flex column, a child with overflow:hidden (e.g. a rounded card whose
     full-bleed header is clipped to its corners) gets min-height:0 and becomes
     shrinkable — so when the column overflows the browser squishes it to a thin
     sliver instead of scrolling. Keep scroll-list items at their natural size.
     (Inline `flex`/`flex-shrink` on a child still wins over this.) */
  .scroll>*{flex-shrink:0}
  .scroll::-webkit-scrollbar{display:none}

  /* ---- motion ---- */
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
  @keyframes pop{0%{transform:scale(.6); opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1); opacity:1}}
  @keyframes pulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.06)}}
  @keyframes ring{0%{transform:scale(.7); opacity:.55} 100%{transform:scale(1.9); opacity:0}}
  @keyframes blink{0%,100%{opacity:1} 50%{opacity:.25}}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0); opacity:0} 10%{opacity:1} 100%{transform:translateY(105vh) rotate(540deg); opacity:1}}
  @keyframes bars{0%,100%{transform:scaleY(.4)} 50%{transform:scaleY(1)}}
  @keyframes shimmer{100%{background-position:200% 0}}
  /* tactile ripple on tappable blocks (bigBtn / .opt) */
  .ripple{position:absolute; border-radius:50%; background:rgba(255,255,255,.5); transform:scale(0); animation:rippleAnim .5s ease-out; pointer-events:none}
  @keyframes rippleAnim{to{transform:scale(2.2); opacity:0}}
  @keyframes floaty{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
  .enter{animation:fadeUp .42s cubic-bezier(.2,.7,.25,1) both}
  .stagger>*{animation:fadeUp .5s cubic-bezier(.2,.7,.25,1) both; animation-delay:calc(var(--i,0)*70ms)}
  .pop{animation:pop .4s cubic-bezier(.2,.9,.3,1.2) both}
  @keyframes glint{0%,100%{filter:brightness(1) drop-shadow(0 2px 3px rgba(180,120,0,.25))} 50%{filter:brightness(1.13) drop-shadow(0 3px 6px rgba(255,200,40,.5))}}
  .shine{animation:glint 2.6s ease-in-out infinite}
  /* ---- motion layer (lively) ---- */
  @keyframes slideFwd{from{opacity:0; transform:translateX(30px)} to{opacity:1; transform:translateX(0)}}
  @keyframes slideBack{from{opacity:0; transform:translateX(-30px)} to{opacity:1; transform:translateX(0)}}
  @keyframes popIn{from{opacity:0; transform:scale(.9) translateY(10px)} to{opacity:1; transform:scale(1) translateY(0)}}
  @keyframes correctPop{0%{transform:scale(1)} 30%{transform:scale(1.045)} 60%{transform:scale(.99)} 100%{transform:scale(1)}}
  @keyframes shakeX{0%,100%{transform:translateX(0)} 18%{transform:translateX(-7px)} 38%{transform:translateX(7px)} 58%{transform:translateX(-5px)} 78%{transform:translateX(4px)}}
  @keyframes burst{0%{transform:translate(-50%,-50%) scale(.2); opacity:1} 100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1); opacity:0}}
  @keyframes glowPulse{0%{box-shadow:0 3px 0 var(--good),0 0 0 0 rgba(31,175,106,.45)} 100%{box-shadow:0 3px 0 var(--good),0 0 0 14px rgba(31,175,106,0)}}
  .enter-fwd{animation:slideFwd .4s cubic-bezier(.2,.8,.2,1) both}
  .enter-back{animation:slideBack .4s cubic-bezier(.2,.8,.2,1) both}
  .btnpop{animation:popIn .42s cubic-bezier(.2,.9,.3,1.25) both}
  .opt.correct{animation:correctPop .55s cubic-bezier(.2,.9,.3,1.2) both, glowPulse .7s ease-out both}
  .opt.wrong{animation:shakeX .42s both}
  .burstwrap{position:absolute; left:50%; top:34%; width:0; height:0; z-index:20; pointer-events:none}
  .spark{position:absolute; left:0; top:0; border-radius:2px; animation:burst .72s cubic-bezier(.15,.7,.3,1) forwards}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.001s !important; scroll-behavior:auto !important} }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  .spin{ animation:spin .8s linear infinite }
  /* animated fire flame */
  @keyframes flicker{0%,100%{transform:scale(1,1) rotate(-1.5deg)} 25%{transform:scale(1.08,1.14) rotate(1.5deg)} 50%{transform:scale(.95,1.06) rotate(-1deg)} 75%{transform:scale(1.06,1.1) rotate(2deg)}}
  /* L4: pause the .flame animation when the tab is hidden or the user
     prefers reduced motion — the audit observed three infinite .flame

  .flame{display:inline-flex; transform-origin:bottom center; animation:flicker 1s ease-in-out infinite}

  /* "well done" praise pop */

  /* swipe carousel */

  @keyframes starPop{0%{opacity:0; transform:scale(.15) rotate(-45deg)} 55%{opacity:1; transform:scale(1.14) rotate(7deg)} 74%{transform:scale(.95) rotate(-2deg)} 100%{opacity:1; transform:scale(1) rotate(0)}}
  @keyframes glowOut{0%{opacity:0; transform:scale(.3)} 55%{opacity:.8} 100%{opacity:0; transform:scale(1.75)}}
  @keyframes flashOut{0%{opacity:0} 45%{opacity:.95} 100%{opacity:0}}
  @keyframes riseIn{0%{opacity:0; transform:translateY(16px)} 100%{opacity:1; transform:translateY(0)}}
  @keyframes twinkle{0%,100%{opacity:1} 50%{opacity:.55}}
  .sp-fly{animation:spkFly .95s cubic-bezier(.3,.7,.3,1) both}
  .sp-star{animation:starPop .8s cubic-bezier(.2,.9,.3,1.25) .7s both, twinkle 2.4s ease-in-out 1.6s infinite}
  .sp-glow{animation:glowOut 1s ease-out .72s both}
  .sp-flash{animation:flashOut .55s ease-out .7s both}
  .sp-w1{animation:riseIn .6s ease-out 1.2s both}

  /* confetti celebration */

  .conf{position:absolute; top:-20px; width:9px; height:14px; border-radius:2px; will-change:transform; z-index:6}

  /* ---- reusable ---- */
  .press{transition:transform .08s ease, box-shadow .08s ease; user-select:none}

  .ico svg{display:block}

  .recwave{position:absolute; inset:0; border-radius:50%; border:3px solid var(--p); animation:ring 1.4s ease-out infinite}
  .toast{position:absolute; left:50%; bottom:86px; transform:translateX(-50%); z-index:40;
    background:#1b2050; color:#fff; padding:11px 16px; border-radius:14px; font-size:13px; font-weight:800;
    box-shadow:0 12px 28px -10px rgba(0,0,0,.5); animation:fadeUp .35s both; max-width:90%; text-align:center}
  .conf{position:absolute; top:-10px; border-radius:2px; z-index:1; animation:fall linear infinite}
  ::selection{background:var(--psoft)}
  input:focus{outline:none}
  .field{width:100%; background:#fff; border:2px solid var(--line); border-radius:16px; padding:15px 16px;

  @keyframes ccFade{from{opacity:0}to{opacity:1}}
  @keyframes ccUp{from{transform:translateY(101%)}to{transform:translateY(0)}}

  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{ outline:3px solid var(--p); outline-offset:2px }
</style>

<div id="app"><div class="scr" id="root"></div></div>
<script>
"use strict";

/* ===================== THEME ===================== */
const T_LIGHT = {
  P:'#4f6bf0', PD:'#3a52d6', Psoft:'#e6eaff', psoft:'#e6eaff', Ptint:'#eef1ff',
  bg:'#eef1ff', ink:'#20254f', mut:'#5b6090', faint:'#7e84bd',
  line:'#dde2ff', card:'#ffffff', edge:'#c9d0f5',
  Y:'#ffd43b', Yd:'#e6b800', CO:'#ff8787', COd:'#e86b6b',
  Ysoft:'#fff5d6', Yink:'#8a6a00',
  good:'#1faf6a', goodD:'#178a54', goodSoft:'#ddf5ea',
  bad:'#ef5b6b', badSoft:'#ffe5e8',
  sh:'0 14px 26px -16px rgba(45,50,115,.34)',
  pageBg:'#c9cffa',
  pageGrad:'radial-gradient(120% 120% at 100% 0,#dfe4ff 0,#c9cffa 60%)',
};
/* Dark palette — mirrors every T_LIGHT key. Surfaces go dark warm-gray; the brand
   emerald/indigo stays vivid (slightly brighter) and accent hues are kept. The
   dominant surfaces (page bg, cards, nav) flow through bg/card so the switch is
   mostly a palette swap + a re-render. */
const T_DARK = {
  P:'#7d93ff', PD:'#5a72e6', Psoft:'#222a44', psoft:'#222a44', Ptint:'#1a2032',
  bg:'#0e1220', ink:'#e8ecf4', mut:'#9aa3b5', faint:'#727c93',
  line:'#2a3140', card:'#1a1f29', edge:'#2a3140',
  Y:'#ffd43b', Yd:'#e0bb2e', CO:'#ff9a9a', COd:'#e07878',
  Ysoft:'#3a3320', Yink:'#ffd43b',
  good:'#3fce8a', goodD:'#2faf73', goodSoft:'#16302a',
  bad:'#ff6b7b', badSoft:'#33212a',
  sh:'0 14px 26px -16px rgba(0,0,0,.6)',
  pageBg:'#11151c',
  pageGrad:'radial-gradient(120% 120% at 100% 0,#161b27 0,#0c0f17 60%)',
};
// `T` is a `let` that POINTS at the active palette. Screens read T.* at render
// time, so swapping this reference + a re-render flips the whole UI.
let T = T_LIGHT;
/* Switch the active palette from app.state.darkMode and push the dominant surface
   colors into the CSS variables + <body> so #app and the page chrome go dark too.
   Fully guarded so it is a clean no-op under the Node harness (no document/body). */
function applyTheme(){
  T = T_LIGHT;   // light theme only (dark mode removed)
  try{
    if(typeof document!=='undefined' && document.documentElement && document.documentElement.style){
      const r=document.documentElement.style, set=(k,v)=>{ try{ r.setProperty(k,v); }catch(_){} };
      set('--bg',T.bg); set('--ink',T.ink); set('--mut',T.mut); set('--faint',T.faint);
      set('--line',T.line); set('--card',T.card); set('--edge',T.edge);
      set('--p',T.P); set('--pd',T.PD); set('--psoft',T.Psoft); set('--ptint',T.Ptint);
      set('color-scheme','light');
    }
    if(typeof document!=='undefined' && document.body && document.body.style){
      document.body.style.background = T.pageBg;
      document.body.style.backgroundImage = T.pageGrad;
    }
  }catch(_){}
}
function setDarkMode(_on){ /* dark mode removed — always light */ applyTheme(); }

/* ===================== STORAGE (localStorage w/ memory fallback) ===================== */
const Store = (() => {
  let backend = 'memory'; const mem = {};
  try { const k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); backend='local'; } catch(e){ backend='memory'; }
  return {
    backend,
    get(k){ try{ return backend==='local' ? localStorage.getItem(k) : (k in mem ? mem[k] : null); }catch(e){ return mem[k]??null; } },
    set(k,v){ try{ backend==='local' ? localStorage.setItem(k,v) : (mem[k]=v); }catch(e){ mem[k]=v; } },
    del(k){ try{ backend==='local' ? localStorage.removeItem(k) : (delete mem[k]); }catch(e){ delete mem[k]; } },
  };
})();
const SAVE_KEY = 'talaqa.save.v1';

/* ===================== APP STATE ===================== */
const SECTION_ORDER = ['words','listening','reading','conversation','grammar'];

/* ===================== ENVIRONMENT ===================== */
/* The web PWA is served from the SAME origin it runs on, so any ABSOLUTE link we
   build (the referral invite link) uses `location.origin` directly — localhost in
   dev/preview, https://talaqh.com in production. The NATIVE app (Capacitor iOS/
   Android) is different: it runs at capacitor://localhost, which is NOT a shareable
   web origin, so on native we deliberately fall back to PROD_ORIGIN. */
const PROD_ORIGIN = 'https://talaqh.com';
/* True only inside the Capacitor native shell. window.Capacitor is injected by the
   native runtime and is absent in the browser PWA, so this is the single source of
   truth for every native-vs-web branch (share links, notifications, service worker,
   deep links, status bar, splash). */
function isNativeApp(){ try{ return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform==='function' && window.Capacitor.isNativePlatform()); }catch(_){ return false; } }
function isStandalone(){ try{ return isNativeApp() || (typeof navigator!=='undefined' && navigator.standalone===true) || (typeof window!=='undefined' && window.matchMedia && matchMedia('(display-mode: standalone)').matches); }catch(_){ return false; } }
function appEnv(){
  if(isNativeApp()) return 'production';   // the shipped native binary is always production
  try{
    const h=(typeof location!=='undefined' && location.hostname) ? location.hostname : '';
    if(!h) return 'unknown';
    if(h==='localhost' || h==='127.0.0.1' || h==='0.0.0.0' || h.endsWith('.local')) return 'development';
    if(h.endsWith('.netlify.app') || h.endsWith('.replit.dev') || h.endsWith('.repl.co') || h.endsWith('.csb.app') || h.endsWith('.webcontainer.io') || h.indexOf('preview')!==-1) return 'preview';
    return 'production';
  }catch(_){ return 'unknown'; }
}
/* Base URL for absolute (shareable) links. Native => ALWAYS the public https origin
   (never capacitor://localhost). Web => the live origin (localhost in dev/preview,
   https://talaqh.com in production), falling back to PROD_ORIGIN off-browser. */
function appBaseUrl(){
  if(isNativeApp()) return PROD_ORIGIN;
  try{ if(typeof location!=='undefined'){ const o=location.origin||''; if(/^capacitor:|^ionic:/.test(o)) return PROD_ORIGIN; if(/^https?:/.test(o)) return o; } }catch(_){}
  return PROD_ORIGIN;
}
/* ---- Capacitor native plugin bridge (no-build app) ----
   This project ships as a single static index.html with NO bundler, so the
   Capacitor JS packages (@capacitor/core + the plugin packages) are never
   imported — nothing ever calls registerPlugin(), which means the high-level
   `window.Capacitor.Plugins.*` proxies are NEVER created inside the native shell.
   The native runtime DOES inject the low-level bridge (Capacitor.nativePromise /
   Capacitor.addListener), so we invoke the installed native plugins through it
   directly. If a real Plugins proxy ever exists (e.g. a future bundled build) we
   prefer it. Every call no-ops safely on the web (window.Capacitor is absent). */
function capInvoke(plugin, method, options){
  try{
    const C = (typeof window!=='undefined') && window.Capacitor;
    if(!C) return Promise.reject(new Error('capacitor-unavailable'));
    const P = C.Plugins && C.Plugins[plugin];
    if(P && typeof P[method]==='function') return Promise.resolve(P[method](options||{}));
    if(typeof C.nativePromise==='function') return C.nativePromise(plugin, method, options||{});
    return Promise.reject(new Error('capacitor-bridge-missing'));
  }catch(e){ return Promise.reject(e); }
}
function capAddListener(plugin, eventName, cb){
  try{
    const C = (typeof window!=='undefined') && window.Capacitor;
    if(!C) return;
    const P = C.Plugins && C.Plugins[plugin];
    if(P && typeof P.addListener==='function'){ P.addListener(eventName, cb); return; }
    if(typeof C.addListener==='function'){ C.addListener(plugin, eventName, cb); }
  }catch(_){}
}
/* Safety net: launchAutoHide is false, so the native splash is hidden by boot().
   If boot() ever throws before it gets there, hide it anyway after a short delay so
   the app can never get permanently stuck on the launch screen. */

/* ===================== IAP (Apple In-App Purchase via RevenueCat) =====================
   Native-only paywall. Web build stays free (no Stripe wired up).
   * iOS calls the @revenuecat/purchases-capacitor plugin via capInvoke (no JS SDK
     import — we have no bundler). The plugin auto-registers on the Swift side
     when the package is installed via `npm install` + `npx cap sync`.
   * Server entitlement (TB.isEntitled → is_entitled RPC, migration 0020) is the
     truth source. Purchases SDK is the purchase machinery only.
   * Optimistically flips app.state.entitled after a successful purchase/restore,
     then reconciles from the server (RevenueCat webhook → subscriptions table). */
const IAP = (function(){
  const cfg = (typeof window!=='undefined' && window.__TALAQA_CONFIG__) || {};
  let _configured=false, _configuring=null, _offeringsCache=null, _offeringsAt=0;
  function publicKey(){ return cfg.revenueCatPublicKey || ''; }
  function entitlementId(){ return cfg.entitlementId || 'talaqh_pro'; }
  function available(){ return isNativeApp() && !!publicKey(); }
  function _err(where, e){
    try{ console.error('[IAP] '+where+' failed:', e); }catch(_){}
    try{ window.__iapLastError = String((e&&e.message)||e); }catch(_){}
  }
  async function configure(uid){
    if(!available()) return false;
    if(_configured) return true;
    if(_configuring) return _configuring;
    _configuring = (async ()=>{
      try{
        await capInvoke('Purchases','configure',{ apiKey: publicKey(), appUserID: uid||null });
        if(uid){ try{ await capInvoke('Purchases','logIn',{ appUserID: uid }); }catch(e){ _err('configure.logIn', e); } }
        _configured = true;
        try{ console.log('[IAP] configured. plugins=', Object.keys((window.Capacitor&&window.Capacitor.Plugins)||{})); }catch(_){}
        return true;
      }catch(e){ _err('configure', e); return false; }
      finally{ _configuring = null; }
    })();
    return _configuring;
  }
  async function logIn(uid){
    if(!available() || !uid) return null;
    const ok = await configure(uid);
    if(!ok) return null;
    try{ return await capInvoke('Purchases','logIn',{ appUserID: uid }); }catch(e){ _err('logIn', e); return null; }
  }
  async function getOfferings(force){
    if(!available()) return null;
    const ok = await configure();
    if(!ok) return null;
    const now=Date.now();
    if(!force && _offeringsCache && (now-_offeringsAt)<60000) return _offeringsCache;
    try{
      const res = await capInvoke('Purchases','getOfferings',{});
      const off = (res && (res.current || (res.all && Object.values(res.all)[0]))) || null;
      // Only CACHE an offering that actually has packages — otherwise an empty
      // result from the StoreKit-sandbox propagation window or a transient
      // ASC sync would poison the cache for 60s and lock the paywall.
      if(off && Array.isArray(off.availablePackages) && off.availablePackages.length){
        _offeringsCache = off; _offeringsAt = now;
      } else {
        _offeringsCache = null; _offeringsAt = 0;
        try{ console.warn('[IAP] getOfferings returned no packages — sandbox tester signed in? products Ready to Submit?'); }catch(_){}
      }
      return _offeringsCache;
    }catch(e){ _err('getOfferings', e); _offeringsCache=null; _offeringsAt=0; return null; }
  }
  async function purchasePackage(pkg){
    if(!available() || !pkg) throw new Error('iap-unavailable');
    return await capInvoke('Purchases','purchasePackage',{ aPackage: pkg });
  }
  async function restorePurchases(){
    if(!available()) return null;
    try{ return await capInvoke('Purchases','restorePurchases',{}); }catch(e){ _err('restorePurchases', e); return null; }
  }
  /* Refresh app.state.entitled from the SERVER (is_entitled RPC). Optimistic
     callers can pre-flip entitled=true after a successful purchase; this then
     reconciles with the webhook-updated subscriptions row within a few seconds.
     H6: also reconcile the legacy local `subscribed` flag — the audit observed
     subscribed:true / entitled:false / premium_until:null, which made Settings
     show "مشترك بريميوم • مفعل" for a user who actually had no entitlement.
     Treat the server's no-entitlement signal as the truth and clear the stale
     local flag so Settings + gating both reflect reality. */
  async function refreshEntitlementFromServer(){
    try{
      const TB = (typeof window!=='undefined') && window.TalaqaBackend;
      if(!TB || !TB.enabled || typeof TB.isEntitled!=='function') return;
      const ent = await TB.isEntitled();
      const patch = {};
      if(app.state.entitled !== !!ent) patch.entitled = !!ent;
      if(!ent && app.state.subscribed){ patch.subscribed = false; patch.plan = null; }
      if(Object.keys(patch).length) app.set(patch);
    }catch(e){ _err('refreshEntitlementFromServer', e); }
  }
  /* Maps a RevenueCat package to our PLANS key ('weekly' / 'monthly' / 'yearly').
     Checks packageType first (the canonical RevenueCat field on v11), then falls
     back to identifier/product-id substring matching for custom-named packages. */
  function planKeyFor(pkg){
    if(!pkg) return null;
    const t = String(pkg.packageType||'').toLowerCase();
    if(t==='weekly') return 'weekly';
    if(t==='monthly') return 'monthly';
    if(t==='annual' || t==='yearly') return 'yearly';
    const id = String(pkg.identifier||'').toLowerCase();
    if(id.includes('week')) return 'weekly';
    if(id.includes('annual') || id.includes('year')) return 'yearly';
    if(id.includes('month')) return 'monthly';
    const prod = String((pkg.product && (pkg.product.identifier||pkg.product.id))||'').toLowerCase();
    if(prod.includes('week')) return 'weekly';
    if(prod.includes('year')) return 'yearly';
    if(prod.includes('month')) return 'monthly';
    return null;
  }
  return { available, configure, logIn, getOfferings, purchasePackage, restorePurchases, refreshEntitlementFromServer, planKeyFor, entitlementId };
})();

const app = {
  state: freshState(),
  listeners: [],
  _timer:null, _toast:null,
  // false until cloud progress has been (attempted to be) restored. While false we
  // persist LOCALLY only — never push local defaults to the backend and risk
  // clobbering good cloud state before loadProgress has run.
  _restored:false,
  // per-chapter generated-lesson cache (browser only; never touched in harness)
  _genCache:{}, _genBusy:false, _writing:null,
  // transient (NOT persisted): true when the last cloud save failed; drives the
  // settings footer warning and the 'online' retry. _lastUnsaved holds that blob.
  _cloudDirty:false, _lastUnsaved:null,
  // transient celebration queue (NOT persisted): pending milestone screens to show.
  _mileQ:[],
  subscribe(fn){ this.listeners.push(fn); },
  // rAF-coalesced notify: a burst of set() / setUI() calls within the same
  // animation frame triggers ONE render instead of N. Without this, render-time
  // side effects (paywall fetches, leaderboard refreshes, etc.) could double or
  // triple the render work each frame, which was a major source of the lag the
  // user reported on phone.
  _notifyNow(){ this._notifyRaf=0; this.listeners.forEach(f=>{ try{ f(this.state); }catch(_){ } }); },
  notify(){
    if(this._notifyRaf) return;
    if(typeof requestAnimationFrame==='function'){
      this._notifyRaf = requestAnimationFrame(()=>this._notifyNow());
    } else {
      this._notifyRaf = setTimeout(()=>this._notifyNow(), 0);
    }
  },
  set(patch){ Object.assign(this.state, patch); this.persist(); this.notify(); },
  setUI(patch){ this.state.ui = Object.assign({}, this.state.ui, patch); this.notify(); },
  persist(){
    const out={}; persistedKeys.forEach(k=>out[k]=this.state[k]);
    Store.set(SAVE_KEY, JSON.stringify(out));
    // Sync to the backend (per-user) so level/progress/streak survive re-login.
    // Guarded by _restored: until cloud progress is restored we don't push, so a
    // debounced save of local defaults can't overwrite good cloud state on re-login.
    try{
      const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
      if(!this._restored) return;
      if(TB && TB.enabled && TB.saveState && this.state.authed){
        clearTimeout(this._saveTimer);
        this._saveTimer=setTimeout(()=>{ try{ Promise.resolve(TB.saveState(out)).then(ok=>{ app._cloudDirty=!ok; if(!ok) app._lastUnsaved=out; if(app.notify) app.notify(); }).catch(()=>{ app._cloudDirty=true; app._lastUnsaved=out; }); }catch(_){ app._cloudDirty=true; app._lastUnsaved=out; } }, 1500);
      }
      // Sync xp/level/streak to the account so the real leaderboard reflects this user.
      if(TB && TB.enabled && TB.syncProgress && this.state.authed){
        clearTimeout(this._syncTimer);
        const _self=this;
        this._syncTimer=setTimeout(()=>{ try{ TB.syncProgress(_self.state.xp, _self.state.level, _self.state.streak); }catch(_){} }, 1500);
      }
    }catch(_){}
  },
  // Push the current state to the cloud IMMEDIATELY (no debounce) — used at
  // milestones (placement done, onboarding finished) so the level/progress can't
  // be lost if the user closes the app before the 1.5s autosave fires.
  forceSave(){
    try{
      const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
      if(this._restored && TB && TB.enabled && TB.saveState && this.state.authed){
        const out={}; persistedKeys.forEach(k=>out[k]=this.state[k]);
        clearTimeout(this._saveTimer);
        TB.saveState(out);
        if(TB.syncProgress) try{ TB.syncProgress(this.state.xp, this.state.level, this.state.streak); }catch(_){}
      }
    }catch(_){}
  },
  load(){
    try{
      const raw = Store.get(SAVE_KEY); if(!raw) return false;
      const data = JSON.parse(raw); const fresh = freshState();
      Object.assign(this.state, data);
      // migrate nested objects so newly-added keys (e.g. new sections) get defaults
      this.state.sections = Object.assign({}, fresh.sections, data.sections||{});
      this.state.settings = Object.assign({}, fresh.settings, data.settings||{});
      this.state.user = Object.assign({}, fresh.user, data.user||{});
      if(!this.state.doneChapters || typeof this.state.doneChapters!=='object') this.state.doneChapters = {};
      if(!this.state.hitMilestones || typeof this.state.hitMilestones!=='object') this.state.hitMilestones = {};
      if(!this.state.unlockedAchv || typeof this.state.unlockedAchv!=='object') this.state.unlockedAchv = {};
      if(typeof this.state.currentChapter==='undefined') this.state.currentChapter = null;
      if(!Array.isArray(this.state.words) || this.state.words.length!==fresh.words.length) this.state.words = fresh.words;
      this.state.darkMode = false;   // dark mode removed — always light
      return !!data.authed;
    }catch(e){ return false; }
  },
  reset(){ Store.del(SAVE_KEY); this.state = freshState(); this.persist(); }
};

// Sign out WITHOUT wiping cloud progress. The old path (app.reset()) left
// _restored=true, so the chained persist() pushed EMPTY state to the cloud 1.5s
// later — clobbering the user's real progress — and never called TB.signOut().
function logout(){
  app._restored=false;                                   // stop any cloud push first
  try{ clearTimeout(app._saveTimer); }catch(_){}
  try{ clearTimeout(app._syncTimer); }catch(_){}
  const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
  try{ if(TB && TB.signOut) TB.signOut(); }catch(_){}    // clears the Supabase session
  try{ Store.del(SAVE_KEY); }catch(_){}
  app.state=freshState();
  app._restored=false;                                   // keep gated until a real re-login
  go('auth',{},{resetStack:true});
}

const LESSON_SCREENS = { word_teach:1, word_spell:1, word_pron:1, word_mean:1, bridge:1, summary:1, full_quiz:1, words_review:1, review:1, weak_practice:1,
  listen_clip:1, listen_q:1, reading:1, convo_intro:1, convo:1, grammar_lesson:1, grammar_examples:1, grammar_q:1, writing:1,
  unit_hub:1, found_intro:1, found_letters:1, found_word:1 };
function go(screen, params={}, opts={}){
  app._navDir = 'fwd';
  const cur = app.state.screen;
  const stack = opts.resetStack ? [] : app.state.stack.slice();
  if(!opts.replace && !opts.resetStack && cur) stack.push({screen:cur, params:app.state.params});
  const patch = { screen, params, stack, ui:{} };
  if(LESSON_SCREENS[screen]) patch.savedPosition = { screen, params };  // auto-save resume point (persisted)
  app.set(patch);
  scrollTops();
}
function back(){
  app._navDir = 'back';
  const stack = app.state.stack.slice();
  const prev = stack.pop();
  if(prev){ app.set({ screen:prev.screen, params:prev.params||{}, stack, ui:{} }); }
  else { go('home',{},{resetStack:true}); }
}
function tabGo(screen){ app._navDir = 'tab'; app.set({ screen, params:{}, stack:[], ui:{} }); }

/* ===================== TINY DOM (h) ===================== */
function h(tag, props, ...kids){
  const e = document.createElement(tag);
  if(props){
    for(const k in props){
      const v = props[k];
      if(v==null || v===false) continue;
      if(k==='style' && typeof v==='object'){ for(const sk in v){ const sv=v[sk]; if(sv==null) continue; if(sk.charCodeAt(0)===45 && sk.charCodeAt(1)===45){ e.style.setProperty(sk, String(sv)); } else { e.style[sk]=sv; } } }
      else if(k==='class'){ e.className = v; if(typeof v==='string' && (' '+v+' ').indexOf(' en ')!==-1) e.setAttribute('lang','en'); }
      else if(k==='html'){ e.innerHTML = v; }
      else if(k.startsWith('on') && typeof v==='function'){ e.addEventListener(k.slice(2).toLowerCase(), v); }
      else if(v===true){ e.setAttribute(k,''); }
      else { e.setAttribute(k, v); }
    }
  }
  for(const kid of kids.flat(Infinity)){
    if(kid==null || kid===false) continue;
    e.appendChild(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return e;
}

/* ===================== AUDIO (client-side TTS, single source, guarded) ===================== */
const Audio2 = {
  speaking:null, _el:null, _token:0,
  supported(){ return typeof window!=='undefined' && 'speechSynthesis' in window; },
  stop(){
    // Bump the token first so any in-flight clip-url/tts promise from a
    // previous speak() call drops out before touching the <audio> element.
    // M2: without this, tapping example button A then B (each kicks off an
    // async clipUrl() lookup) could let A's late-resolving promise overwrite
    // B's src — playing the wrong sentence for the tapped button.
    this._token++;
    try{ if(this._el){ this._el.pause(); this._el.currentTime=0; } }catch(e){}
    try{ if(this.supported()) window.speechSynthesis.cancel(); }catch(e){}
    this.speaking=null;
  },
  speak(text, onend, rate){
    this.stop();
    const myToken = ++this._token;                   // claim this call's slot
    const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
    // Real, natural TTS via the backend when connected; browser voice otherwise.
    if(TB&&TB.enabled&&TB.tts){
      const self=this;
      const el=this._el||(this._el=new Audio());
      try{ el.preload='auto'; }catch(_){}
      let done=false;
      const stale=()=>self._token!==myToken;          // a newer speak() invalidated us
      const finish=()=>{ if(done)return; done=true; if(stale()) return; self.speaking=null; if(onend)onend(); };
      // Set src + play a url, calling onFail on any load/play error.
      const startPlay=(url, onFail)=>{
        if(stale()) return;                           // a later speak() already won
        el.src=url;
        try{ el.playbackRate = rate||1; }catch(_){}   // slow/normal playback for the TTS clip
        el.onended=finish;
        el.onerror=onFail;
        self.speaking=text;
        const p=el.play(); if(p&&p.catch) p.catch(onFail);
      };
      const toSynth=()=>{ if(stale()) return; self.speaking=null; self._fallback(text,onend,rate); };           // last resort: browser voice
      const generate=()=>{ if(stale()) return; TB.tts(text).then(u=>startPlay(u,toSynth)).catch(toSynth); };     // CDN miss: generate, then play
      // FAST PATH: play the predicted CDN clip DIRECTLY — one round-trip, no blocking
      // HEAD pre-check, HTTP-cached after the first play (sub-second). Only if it 404s
      // do we generate it; only if that fails do we fall back to the browser voice.
      if(TB.clipUrl){ TB.clipUrl(text).then(u=>startPlay(u,generate)).catch(generate); }
      else { TB.tts(text).then(u=>startPlay(u,toSynth)).catch(toSynth); }
      return;
    }
    this._fallback(text, onend, rate);
  },
  _fallback(text, onend, rate){
    if(!this.supported()){ if(onend) setTimeout(onend, 650); return; }
    try{
      const u=new SpeechSynthesisUtterance(text);
      const isAr = /[؀-ۿ]/.test(text);
      u.lang = isAr ? 'ar' : 'en-US';                 // pick an Arabic voice for Arabic text
      // H7: This path runs only when both the pre-generated CDN clip and the
      // server TTS failed (network down, edge function 500, etc.). For English
      // text we MUST have an English voice installed — many Saudi devices set
      // to Arabic locale ship without one, in which case speechSynthesis would
      // play the wrong-language voice or silently no-op. Warn the user once so
      // they understand why an English-learning app suddenly has no audio.
      try{
        if(!isAr){
          const voices = (window.speechSynthesis.getVoices && window.speechSynthesis.getVoices()) || [];
          const hasEn = voices.some(v=>/^en/i.test(v.lang||''));
          if(!hasEn && !window._talaqaTtsWarned){
            window._talaqaTtsWarned = true;
            try{ if(typeof toast==='function') toast('ما لقينا صوت إنجليزي على جهازك — الصوت قد ما يشتغل. حاول تحدّث الإنترنت.'); }catch(_){}
          }
        }
      }catch(_){}
      u.rate=rate||.92; u.pitch=1;
      u.onend=()=>{ this.speaking=null; if(onend)onend(); };
      u.onerror=()=>{ this.speaking=null; if(onend)onend(); };
      this.speaking=u; window.speechSynthesis.speak(u);
    }catch(e){ if(onend) setTimeout(onend,650); }
  }
};

/* ===================== SFX (Web-Audio sound effects, browser-only, guarded) =====================
   Tiny synthesized cues — no assets. ONE lazily-created AudioContext, resumed on the
   first user gesture. Every method is a no-op when settings.sfx is off or when there's
   no Web-Audio (e.g. the Node harness has no AudioContext). */
const SFX = {
  _ctx:null,
  _on(){ return !!(app.state && app.state.settings && app.state.settings.sfx); },
  ctx(){
    if(this._ctx) return this._ctx;
    if(typeof window==='undefined') return null;
    const AC = (typeof AudioContext!=='undefined') ? AudioContext
             : (typeof webkitAudioContext!=='undefined') ? webkitAudioContext : null;
    if(!AC) return null;
    try{ this._ctx=new AC(); }catch(e){ this._ctx=null; }
    return this._ctx;
  },
  resume(){ try{ const c=this.ctx(); if(c && c.state==='suspended') c.resume(); }catch(e){} },
  // play one short tone; t0 = start offset (s) from "now", with a click-free envelope
  _tone(freq, t0, dur, type, peak){
    const c=this._ctx; if(!c) return;
    try{
      const osc=c.createOscillator(), g=c.createGain();
      osc.type=type||'sine'; osc.frequency.value=freq;
      const start=c.currentTime+t0, vol=peak||0.16;
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(vol, start+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
      osc.connect(g); g.connect(c.destination);
      osc.start(start); osc.stop(start+dur+0.02);
    }catch(e){}
  },
  _seq(notes){ // notes: [[freq,dur,type,peak], ...] played back-to-back
    if(!this._on()) return; const c=this.ctx(); if(!c) return; this.resume();
    let t=0; for(const n of notes){ this._tone(n[0], t, n[1], n[2], n[3]); t+=n[1]; }
  },
  correct(){ this._seq([[523.25,0.07,'triangle'],[659.25,0.07,'triangle'],[783.99,0.11,'triangle']]); },
  wrong(){ this._seq([[180,0.10,'sine',0.13],[120,0.16,'sine',0.13]]); },
  level(){ this._seq([[523.25,0.10,'triangle'],[659.25,0.10,'triangle'],[783.99,0.10,'triangle'],[1046.5,0.20,'triangle',0.18]]); },
  pop(){ this._seq([[880,0.05,'sine',0.10]]); },
};

/* Word of the day — rotates every 24h, deterministically, and is picked from the
   LEARNER'S OWN level word pool (FND/A1..C1). Pure client-side; falls back to the
   static word when no curriculum is loaded (offline/harness). */
function wordOfDay(s){
  try{
    const C=(typeof _curr==='function') && _curr();
    if(!C || !Array.isArray(C.words)) return WORD_OF_DAY;
    const lvl=(s && s.isBeginner) ? 'FND' : ((s && s.level) || 'A1');
    let pool=C.words.filter(w=>w && w.en && w.level===lvl);
    if(pool.length<3) pool=C.words.filter(w=>w && w.en);
    if(!pool.length) return WORD_OF_DAY;
    const day=Math.floor(Date.now()/86400000);   // calendar-day index (changes every 24h)
    const w=pool[day % pool.length];
    const ex=(typeof window!=='undefined' && window.WORD_EXAMPLES && window.WORD_EXAMPLES[(w.en||'').toLowerCase()]) || [];
    return {
      en:w.en,
      ipa:w.phonetic ? ('['+w.phonetic+']') : '',
      ar:w.ar||'',
      exEn:(ex[0]&&ex[0].en) || w.ex_en || '',
      exAr:(ex[0]&&ex[0].ar) || w.ex_ar || '',
    };
  }catch(_){ return WORD_OF_DAY; }
}

// curriculum (window.CURRICULUM), fall back to the built-in 5 for the demo.
// Return the CURRENT attempt's question set, cached so it stays stable while the
// test is in progress (placementQuestions runs on every render). app._placeSet is
// reset when the user starts a new test -> a fresh RANDOM set each attempt.
function placementQuestions(){
  if(app._placeSet && app._placeSet.length) return app._placeSet;
  app._placeSet = buildPlacementSet();
  return app._placeSet;
}
function buildPlacementSet(){
  const C=(typeof window!=='undefined')&&window.CURRICULUM;
  if(C && Array.isArray(C.placement) && C.placement.length){
    const mapped=C.placement.map(q=>{
      const opts=(q.options||[]).filter(x=>x!=null && x!=='');
      const en=/^[\x00-\x7F\s.,'"?!-]*$/.test(opts.join(''));
      let ans=opts.indexOf(q.answer); if(ans<0) ans=0;
      return { prompt:q.q, choices:opts, answer:ans, level:q.level||'A1', en };
    });
    // 15-question test: RANDOM 3 per level (varies each attempt), ordered A1 -> C1.
    const per=3, order=['A1','A2','B1','B2','C1'], out=[];
    for(const lv of order){ out.push(..._shuffle(mapped.filter(q=>q.level===lv)).slice(0,per)); }
    return out.length ? out : _shuffle(mapped).slice(0,15);
  }

}
// Map correct-by-level counts -> a CEFR start level (mirrors the content's rubric).
function scorePlacement(acc){
  // Place at the HIGHEST level the learner passes, where "pass" = >=60% correct
  // of that level's questions (proportional, so it works for 6 or 9 per level).
  const order=['A1','A2','B1','B2','C1'];
  const pass=(l)=>{ const a=acc[l]; if(!a || !a.t) return false; return (a.c / a.t) >= 0.6; };
  if(!pass('A1')) return 'beginner';            // can't clear A1 -> Foundations
  let lvl='A1';
  for(let k=1;k<order.length;k++){ if(pass(order[k])) lvl=order[k]; else break; }
  return lvl;
}

function _curr(){ return (typeof window!=='undefined') && window.CURRICULUM; }
function _backend(){ return (typeof window!=='undefined') && window.TalaqaBackend; }
function _shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
/* Damerau-Levenshtein edit distance (counts an adjacent-letter swap as ONE edit,
   so common typos like "recieve" read as close). Used for confusing distractors
   and the spelling "قريب" near-match. */
function _editDist(a,b){
  a=String(a).toLowerCase(); b=String(b).toLowerCase();
  const m=a.length, n=b.length;
  if(!m) return n; if(!n) return m;
  const d=[]; for(let i=0;i<=m;i++){ d[i]=[i]; } for(let j=0;j<=n;j++){ d[0][j]=j; }
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const cost=a[i-1]===b[j-1]?0:1;
      d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+cost);
      if(i>1 && j>1 && a[i-1]===b[j-2] && a[i-2]===b[j-1]) d[i][j]=Math.min(d[i][j], d[i-2][j-2]+1);
    }
  }
  return d[m][n];
}
/* Global distractor pool built once from the WHOLE curriculum, so quiz options can
   be CONFUSING NEW words the learner didn't just study (not the unit's own 5). */
let _DPOOL=null;
function distractPool(){
  if(_DPOOL) return _DPOOL;
  const C=_curr(); const words=(C&&Array.isArray(C.words))?C.words:[];
  const seenAr={}, seenEn={}, ar=[], en=[];
  words.forEach(w=>{ if(!w) return;
    const a=(w.ar||'').trim(), e=(w.en||'').trim(), pos=w.pos||'', lvl=w.level||'';
    if(a && !seenAr[a]){ seenAr[a]=1; ar.push({ ar:a, pos, lvl }); }
    if(e && !seenEn[e.toLowerCase()]){ seenEn[e.toLowerCase()]=1; en.push({ en:e, pos, lvl }); }
  });
  _DPOOL={ ar, en };
  return _DPOOL;
}
/* n CONFUSING Arabic-meaning distractors from the whole curriculum, excluding the
   answer + the unit's own meanings. Prefers same part-of-speech (and level) so the
   options are plausible — the learner can't pick by "which one I just saw". */
function distractAr(answerAr, excludeAr, n, pos, level){
  const pool=distractPool().ar; if(!pool.length) return [];
  const excl={}; (excludeAr||[]).forEach(a=>{ if(a) excl[String(a).trim()]=1; }); excl[String(answerAr).trim()]=1;
  const cands=pool.filter(w=>!excl[w.ar]);
  const t1=cands.filter(w=>pos&&w.pos===pos&&level&&w.lvl===level);  // same category + level
  const t2=cands.filter(w=>pos&&w.pos===pos);                        // same category
  const t3=cands;                                                    // anything else
  const ordered=_shuffle(t1).concat(_shuffle(t2)).concat(_shuffle(t3));
  const out=[], seen={};
  for(const w of ordered){ if(out.length>=n) break; if(seen[w.ar]) continue; seen[w.ar]=1; out.push(w.ar); }
  return out;
}
/* n CONFUSING English distractors — real curriculum words that LOOK like the answer
   (similar spelling/length/first-letter) so the choice isn't obvious. */
function distractEn(answerEn, excludeEn, n){
  const pool=distractPool().en; if(!pool.length) return [];
  const ans=String(answerEn||'').toLowerCase();
  const excl={}; (excludeEn||[]).forEach(e=>{ if(e) excl[String(e).toLowerCase()]=1; }); excl[ans]=1;
  const cands=pool.filter(w=>!excl[w.en.toLowerCase()]);
  const scored=cands.map(w=>{ const e=w.en.toLowerCase();
    let d=_editDist(ans,e);
    if(e[0]===ans[0]) d-=0.6;                       // same starting letter -> looks alike
    d+=Math.abs(e.length-ans.length)*0.3;           // similar length -> looks alike
    return { en:w.en, d };
  }).sort((a,b)=>a.d-b.d);
  const top=scored.slice(0, Math.max(n*4, 12));     // a confusing top slice...
  const out=[], seen={};
  for(const w of _shuffle(top)){ if(out.length>=n) break; const k=w.en.toLowerCase(); if(seen[k]) continue; seen[k]=1; out.push(w.en); }
  if(out.length<n){ for(const w of scored){ if(out.length>=n) break; const k=w.en.toLowerCase(); if(seen[k]) continue; seen[k]=1; out.push(w.en); } }
  return out;
}
/* group a level's word rows into ordered chapters (preserving first-seen order) */
function chaptersFor(level){
  const C=_curr(); if(!C || !Array.isArray(C.words)) return [];
  const topicMap={};
  (C.chapters||[]).forEach(c=>{ topicMap[c.level+'|'+c.number]=c.topic_en||''; });
  const order=[], byKey={};
  C.words.filter(w=>w.level===level).forEach(w=>{
    const key=w.chapter_no+'|'+w.chapter_title;
    if(!byKey[key]){ byKey[key]={ level:w.level, no:w.chapter_no, title:w.chapter_title, topic:topicMap[w.level+'|'+w.chapter_no]||'', words:[] }; order.push(key); }
    byKey[key].words.push(w);

/* map 5 raw curriculum rows -> the app's word shape */
function mapWords(rawRows){
  const rows=rawRows.slice(0,5);

  return rows.map((r,i)=>{
    const thisAr=r.ar;
    // CONFUSING distractors: NEW words from the whole curriculum (same part-of-speech
    // / level so they're plausible), not the other words the learner just studied.
    let distractors=distractAr(thisAr, unitAr, 3, r.pos, r.level);
    if(distractors.length<3){   // tiny/absent curriculum (demo, harness) -> old behavior

    if(t==='reverse'){ const c=pickEnChoices(i); return { type:'reverse', prompt:'اختر الكلمة الإنجليزية الصح لـ:', word:w.ar, choices:c.choices, answer:c.answer }; }

/* Re-shuffle an MCQ's choices on EVERY quiz entry (so answer positions can't be
   memorized). The shuffled copy is cached in s.ui per question key — it survives
   setUI (sel/revealed) re-renders but is rebuilt on each navigation (go() resets
   ui). The answer index is remapped so grading stays correct. */
function shuffledMcq(s, key, choices, answer){
  if(!Array.isArray(choices) || choices.length<2 || typeof answer!=='number') return { choices, answer };
  let sh=s.ui._shuf;
  if(!sh || sh.key!==key){
    const idx=_shuffle(choices.map((_,i)=>i));
    sh={ key, choices:idx.map(i=>choices[i]), answer:idx.indexOf(answer) };
    s.ui._shuf=sh;   // direct write (no setUI) — computed during render, no re-render loop
  }

/* On boot/re-login the let-globals (WORDS/UNIT/FULL_QUIZ/CONVO) keep their demo
   defaults; only loadChapter swaps them. Re-hydrate them from the saved
   currentChapter so home/unit_hub/quizzes show the right chapter, not the demo. */
function restoreCurrentChapter(){
  if(!_curr()) return;
  try{ maybeLevelUp(true); }catch(_){}   // silent rescue for users already on a fully-completed level
  if(!app.state.currentChapter){
    // No chapter chosen yet (new user, or just (re)did the placement) -> default to
    // the FIRST chapter of the user's OWN level so home/unit_hub show their level
    // (e.g. C1's first unit) instead of the demo "numbers" unit.
    if(app.state.authed) ensureChapterForLevel();
    return;
  }
  const ch=currentChapterObj();
  if(ch && UNIT.index!==ch.no){ applyChapterContent(ch); ensureCurrentLesson(); }
}
/* Load the first chapter of the learner's level when none is loaded yet. */
function ensureChapterForLevel(){
  if(!_curr() || app.state.currentChapter) return false;
  const lvl = app.state.isBeginner ? 'FND' : (app.state.level||'A1');
  const chs = chaptersFor(lvl);
  if(chs && chs[0]){ loadChapter(chs[0]); return true; }
  return false;
}
/* Level progression: once EVERY chapter of the learner's current CEFR level is
   done, promote them to the next level (A1→A2→B1→B2→C1) and clear currentChapter
   so the journey/home pick up the new level's first unit. Returns true if promoted.
   persist() then syncs the new current_level to the server. (Beginners leave the
   Foundations stage via the foundations flow, so they're skipped here.) */
function maybeLevelUp(silent){
  if(!_curr()) return false;
  const s=app.state;
  if(s.isBeginner) return false;
  const ORDER=['A1','A2','B1','B2','C1'];
  const i=ORDER.indexOf(s.level||'A1');
  if(i<0 || i>=ORDER.length-1) return false;             // unknown level, or already at the top (C1)
  const chs=chaptersFor(ORDER[i]);
  if(!chs.length) return false;
  const done=s.doneChapters||{};
  if(!chs.every(ch=>done[chapterKey(ch)])) return false; // current level not fully finished yet
  const next=ORDER[i+1];
  app.set({ level:next, currentChapter:null });
  if(!silent){ try{ toast('🎉 ترقّيت للمستوى '+next+'! استمر 💪'); }catch(_){} }
  return true;
}
/* re-kick generation if a chapter is loaded (e.g. after a reload) but its lesson isn't cached yet */
function ensureCurrentLesson(){
  const key=app.state.currentChapter; if(!key) return;
  if(app._genCache[key] && app._genCache[key]!=='error') return;   // cached & good → leave; 'error' is retryable
  const ch=currentChapterObj(); if(ch) generateChapterLesson(ch);
}
/* Clear a failed generation and re-kick it (used by the "إعادة المحاولة" button). */
function retryLesson(){ try{ const key=app.state.currentChapter; if(key && app._genCache) delete app._genCache[key]; if(typeof ensureCurrentLesson==='function') ensureCurrentLesson(); if(app.notify) app.notify(); }catch(_){} }
/* true once a real chapter is loaded but its lesson hasn't generated yet */
function lessonPending(){
  const key=app.state.currentChapter; if(!key) return false;
  return !app._genCache[key];
}
function lessonFailed(){
  const key=app.state.currentChapter; if(!key) return false;
  return app._genCache[key]==='error';
}

/* ===================== NOTIFICATIONS (daily reminder) ===================== */
// Web Push (server-sent) so the daily reminder fires even when the app is CLOSED.
const VAPID_PUBLIC = 'BCAtjWyEn1XT9Gc4wsQGBjH2dpw-0nzD8LtspbVSSv7jM7ST5os-Gcw9Pf_gA9p2PQlCh90XjaacWvH65x3CV8o';
function urlB64ToUint8(b64){
  const pad='='.repeat((4 - b64.length % 4) % 4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const a=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) a[i]=raw.charCodeAt(i);
  return a;
}
const Notify = {
  _timer:null, _firedKey:null,
  supported(){ return typeof window!=='undefined' && 'Notification' in window; },
  permission(){ return this.supported() ? Notification.permission : 'denied'; },
  async enable(){
    if(!this.supported()) return 'unsupported';
    if(Notification.permission==='granted') return 'granted';
    if(Notification.permission==='denied') return 'denied';
    try{ return await Notification.requestPermission(); }catch(e){ return 'denied'; }
  },
  // Subscribe THIS device to web push + store the subscription server-side, so the
  // send-reminders cron can notify it at the chosen time even when the app is closed.
  async subscribePush(){
    try{
      if(typeof navigator==='undefined' || !('serviceWorker' in navigator) || typeof window==='undefined' || !('PushManager' in window)) return false;
      const TB=window.TalaqaBackend;
      if(!(TB && TB.enabled && TB.savePushSubscription)) return false;
      const reg=await navigator.serviceWorker.ready;
      let sub=await reg.pushManager.getSubscription();
      if(!sub){ sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC) }); }
      return await TB.savePushSubscription(sub.toJSON ? sub.toJSON() : sub);
    }catch(e){ return false; }
  },
  async unsubscribePush(){
    try{
      const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
      if(typeof navigator!=='undefined' && 'serviceWorker' in navigator){
        const reg=await navigator.serviceWorker.ready;
        const sub=await reg.pushManager.getSubscription();
        if(sub){ try{ await sub.unsubscribe(); }catch(_){} }
      }
      if(TB && TB.removePushSubscription) await TB.removePushSubscription();
    }catch(e){}
  },
  show(title, body){
    try{
      if(this.permission()!=='granted') return;
      const opts={ body, icon:'icons/icon-192.png', badge:'icons/icon-192.png', lang:'ar', dir:'rtl', tag:'talaqa-daily' };
      if(navigator.serviceWorker && navigator.serviceWorker.ready){ navigator.serviceWorker.ready.then(reg=>{ try{ reg.showNotification(title,opts); }catch(_){ try{ new Notification(title,opts); }catch(__){} } }); }
      else { new Notification(title,opts); }
    }catch(e){}
  },
  // Best-effort daily reminder while the app is open. (Guaranteed background
  // delivery when the app is closed needs the native build / Web Push.)
  start(){
    clearInterval(this._timer); if(typeof window==='undefined') return;
    this._timer=setInterval(()=>{
      try{
        const st=(app.state.settings)||{};
        if(!st.dailyReminder || this.permission()!=='granted') return;
        const d=new Date(); const cur=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        const key=d.toDateString();
        if(cur===(st.reminderTime||'19:00') && this._firedKey!==key){ this._firedKey=key; this.show('طلاقة 🔔','جاء وقت درسك — لا تقطع السلسلة! 🔥'); }
      }catch(e){}
    }, 30000);
  }
};
/* Native (Capacitor) daily reminder — replaces Web Push on iOS/Android, where there
   is no service worker / PushManager. Uses @capacitor/local-notifications: the OS
   fires a repeating notification at the chosen time even when the app is closed, with
   NO server cron needed. Every method no-ops on the web (isNativeApp() === false). */
const NativeNotify = {
  // Reachable when we're in the native shell and the bridge can route plugin calls
  // (low-level nativePromise, or a real Plugins proxy if one was ever bundled).
  available(){ try{ const C=window.Capacitor; return isNativeApp() && !!C && (typeof C.nativePromise==='function' || !!(C.Plugins && C.Plugins.LocalNotifications)); }catch(_){ return false; } },
  async enable(){ if(!this.available()) return 'unsupported'; try{ const r=await capInvoke('LocalNotifications','requestPermissions',{}); return (r && r.display==='granted') ? 'granted' : 'denied'; }catch(_){ return 'denied'; } },
  async schedule(timeStr){ if(!this.available()) return false;
    const m=String(timeStr||'19:00').split(':'); const H=parseInt(m[0],10)||0, M=parseInt(m[1],10)||0;
    try{ await capInvoke('LocalNotifications','cancel',{ notifications:[{ id:1 }] }); }catch(_){}
    try{ await capInvoke('LocalNotifications','schedule',{ notifications:[{ id:1, title:'طلاقة 🔔', body:'جاء وقت درسك — لا تقطع السلسلة! 🔥', schedule:{ on:{ hour:H, minute:M }, repeats:true, allowWhileIdle:true } }] }); return true; }catch(_){ return false; }
  },
  async cancel(){ if(!this.available()) return; try{ await capInvoke('LocalNotifications','cancel',{ notifications:[{ id:1 }] }); }catch(_){} }
};
/* Single entry point for the daily-reminder toggle: native LocalNotifications inside
   the app shell, Web Push (+ best-effort in-app timer) on the web. */
function setReminderSetting(patch){ app.set({ settings: Object.assign({}, app.state.settings, patch) }); }
function enableDailyReminder(){
  if(isNativeApp()){
    NativeNotify.enable().then(res=>{
      if(res==='granted'){ setReminderSetting({ dailyReminder:true }); NativeNotify.schedule(app.state.settings.reminderTime||'19:00'); syncSettings(); toast('شغّلنا التذكير اليومي ✅ — بيوصلك حتى لو البرنامج مقفول'); }
      else if(res==='unsupported'){ toast('الإشعارات مو مدعومة هنا'); }
      else { toast('فعّل إذن الإشعارات من إعدادات الجهاز وحاول مرة ثانية'); }
    });
    return;
  }
  Notify.enable().then(res=>{
    if(res==='granted'){
      setReminderSetting({ dailyReminder:true }); Notify.start(); syncSettings();
      // Register THIS device for server-sent push so the reminder fires even when the
      // app is closed (works on installed mobile web PWAs; native uses LocalNotifications).
      Notify.subscribePush().then(ok=>{ Notify.show('طلاقة ✅', ok ? 'شغّل التذكير اليومي — بتوديك حتى لما البرنامج مقفول' : 'شغّل التذكير (يشتغل لما تفتح البرنامج)'); });
    }
    else if(res==='unsupported'){ toast('الإشعارات ما فيها دعم في هذا المتصفح'); }
    else { toast('فعّل إذن الإشعارات من الإعدادات بعدين حاول مرة ثانية'); }
  });
}
function disableDailyReminder(){ setReminderSetting({ dailyReminder:false }); if(isNativeApp()) NativeNotify.cancel(); else Notify.unsubscribePush(); syncSettings(); }
function toggleDailyReminder(){ if(app.state.settings.dailyReminder) disableDailyReminder(); else enableDailyReminder(); }
function reminderIsOn(){ return isNativeApp() ? !!app.state.settings.dailyReminder : (app.state.settings.dailyReminder && Notify.permission()==='granted'); }
// Persist learner settings to the backend when connected (best-effort).
function syncSettings(){
  try{
    const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
    if(TB&&TB.enabled&&TB.saveSettings){
      const st=app.state.settings||{};
      // Send the device's IANA timezone so the reminder cron fires at the user's
      // LOCAL time, not UTC (e.g. Asia/Riyadh, not 3 hours off).
      let tz='UTC';
      try{ tz=(Intl && Intl.DateTimeFormat) ? (Intl.DateTimeFormat().resolvedOptions().timeZone||'UTC') : 'UTC'; }catch(_){}
      TB.saveSettings({ audio_autoplay:!!st.autoAudio, sound_effects:!!st.sfx, notifications_enabled:!!st.dailyReminder, daily_reminder_time:((st.reminderTime||'19:00'))+':00', timezone:tz });
    }
  }catch(e){}
}

/* True when option choices are (mostly) Latin/English text -> render them LTR so
   generated English MCQ options don't look broken inside the RTL layout. */
function isEnChoices(choices){
  if(!Array.isArray(choices) || !choices.length) return false;
  const joined=choices.join('');
  if(!joined.trim()) return false;
  if(/[؀-ۿ]/.test(joined)) return false;            // any Arabic char -> treat as Arabic
  return /[A-Za-z]/.test(joined);                             // has Latin letters -> English
}
/* generic single-question screen used across the app */
function mcqScreen(cfg){
  const s=app.state, sel=s.ui.sel, revealed=s.ui.revealed, grade=cfg.grade!==false;
  const answered = sel!=null && (grade ? revealed : true);
  const choose=(i)=>{
    if(grade){ if(revealed) return; const ok=i===cfg.answer; buzz(ok?18:[10,40,10]); try{ ok?SFX.correct():SFX.wrong(); }catch(_){} if(!ok && cfg.onWrong){ try{ cfg.onWrong(); }catch(_){} } app.setUI({sel:i, revealed:true}); }
    else { app.setUI({sel:i}); }
  };
  const options = cfg.choices.map((c,i)=>{
    let st='idle';
    if(grade && revealed){ if(i===cfg.answer) st='correct'; else if(i===sel) st='wrong'; else st='dim'; }
    else if(!grade && sel===i) st='selected';
    const isEn = cfg.enChoices;
    const trAr = (cfg.choicesAr && cfg.choicesAr[i]) ? cfg.choicesAr[i] : null;
    return optionButton(c, st, ()=>choose(i), { en:isEn, ar:trAr });
  });
  // optional "I don't know" choice (placement test). Always Arabic, and its index
  // (== choices.length) can never equal a real answer, so it scores as incorrect.
  if(cfg.dontKnow){
    const dki = cfg.choices.length;
    const st = (!grade && sel===dki) ? 'selected' : 'idle';
    options.push(optionButton('ما أعرف الإجابة', st, ()=>choose(dki), { en:false }));
  }
  const contBg = (grade && revealed && sel!==cfg.answer) ? T.P : T.good;
  const contSh = (grade && revealed && sel!==cfg.answer) ? T.PD : T.goodD;
  const isCorrect = grade && revealed && sel===cfg.answer;
  return frame(
    statusBar(),
    cfg.top || (cfg.progress!=null ? lessonTop(cfg.progress, cfg.label, cfg.onClose) : null),
    body({pad:'14px 18px 0', gap:0},
      cfg.preNode ? h('div',{style:{marginBottom:'16px','--i':0}}, cfg.preNode) : null,
      h('div',{style:{fontSize:'20px',fontWeight:900,marginBottom:'16px',unicodeBidi:'plaintext','--i':0}}, cfg.prompt),
      cfg.promptNode ? h('div',{style:{marginBottom:'18px','--i':1}}, cfg.promptNode) : null,
      h('div',{style:{display:'flex',flexDirection:'column',gap:'11px','--i':2}}, ...options),
      cfg.note ? h('div',{style:{marginTop:'14px','--i':3}}, cfg.note) : null,
    ),
    footer(bigBtn(cfg.continueLabel||'كمّل', { disabled:!answered, pop:answered, bg:contBg, sh:contSh, icon:'arrowL',
      onClick:()=>cfg.onContinue && cfg.onContinue(grade ? sel===cfg.answer : sel) })),
    isCorrect ? celebrate() : null
  );
}

/* ISO 3166 alpha-2 -> flag emoji (regional indicator pair). */
function flagOf(iso){ return String(iso||'').toUpperCase().replace(/[A-Z]/g, ch=>String.fromCodePoint(127397+ch.charCodeAt(0))); }
/* Crisp flag IMAGE from flagcdn (Windows ships no flag-emoji font, so emoji
   render as bare letters there). Falls back to the emoji flag if the image fails
   to load (offline / CDN down). It's cross-origin, so the service worker passes
   it straight to the network (uncached) — see sw.js. */
function flagImg(iso, sz){
  const w=(sz&&sz.w)||28, ht=(sz&&sz.h)||20, code=String(iso||'').toLowerCase();
  return h('img',{ src:`https://flagcdn.com/w80/${code}.png`, alt:'', loading:'lazy', decoding:'async',
    style:{ width:w+'px', height:ht+'px', objectFit:'cover', borderRadius:'4px', flexShrink:0, boxShadow:'0 0 0 1px rgba(0,0,0,.10)', display:'block' },
    onError:(e)=>{ try{ const t=e.target; if(t._fb) return; t._fb=1; t.replaceWith(h('span',{ style:{ fontSize:(ht-1)+'px', lineHeight:1, flexShrink:0 } }, flagOf(iso))); }catch(_){ } } });
}

SCREENS.auth = (s)=>{
  const codeStep = s.ui.authStep==='code';
  const busy = !!s.ui.authBusy;
  // Build an E.164 number from the country code + the phone-number input.
  // Read the CONTROLLED value from s.ui.phoneNum first (survives re-renders),
  // falling back to the live DOM field only if state hasn't caught up yet.
  // Read the phone straight from the VISIBLE field at submit time (ground truth),
  // falling back to the silently-tracked state. Avoids any re-render race.
  // Build E.164 from the country code + the phone-number input. Robust against
  // users who already typed +966 / 00966 / 966 in the field (an extremely common
  // habit — without stripping it we'd build "+966966..." and Twilio would never
  // deliver the SMS). H1 in the audit.
  const e164 = ()=>{
    const el=(typeof document!=='undefined')&&document.getElementById('f_phone');
    const raw=(el&&el.value)?el.value:(s.ui.phoneNum||'');
    const cc = (s.ui.cc||'+966');
    const ccDigits = cc.replace(/[^0-9]/g,'');
    let num = String(raw).replace(/[^0-9]/g,'');
    if(num.startsWith('00')) num = num.slice(2);                // international dialing prefix
    if(ccDigits && num.startsWith(ccDigits)) num = num.slice(ccDigits.length); // double-cc
    num = num.replace(/^0+/,'');                                 // national-style leading 0
    return cc + num;
  };

  // --- PHONE STEP: send the SMS code -----------------------------------------
  const sendCode = async ()=>{
    const TB=(typeof window!=='undefined') && window.TalaqaBackend;
    // When re-sending from the code step we already have authPhone; otherwise read the field.
    const phone = (codeStep && s.ui.authPhone) ? s.ui.authPhone : e164();
    const ccDigits = (s.ui.cc||'+966').replace(/[^0-9]/g,'');
    const digits = phone.replace(/[^0-9]/g,'').slice(ccDigits.length);
    // Saudi mobile: enforce ^5\d{8}$ client-side. A malformed Saudi number costs
    // a real SMS attempt that never arrives — too important to leave to Twilio.
    // Non-SA: keep a broad E.164 6–14 sanity check; the per-country format lives
    // at Supabase / Twilio.
    const isSA = (s.ui.cc==='+966') || (s.ui.ccISO==='SA');
    // M8: inline persistent error in addition to the toast. The toast vanishes
    // in ~1s and is easy to miss on mobile; the inline message stays under the
    // field until the input becomes valid (cleared by the onInput handler).
    if(isSA){
      if(!/^5\d{8}$/.test(digits)){
        const msg='رقم الجوال يبدأ بـ 5 ويتكوّن من 9 أرقام';
        app.setUI({ phoneErr: msg });
        toast(msg);
        return;
      }
    } else if(digits.length<6 || digits.length>14){
      const msg='أدخل رقم جوال صحيح';
      app.setUI({ phoneErr: msg });
      toast(msg);
      return;
    }
    if(s.ui.phoneErr) app.setUI({ phoneErr: null });
    if(!(TB && TB.enabled && TB.sendPhoneOtp)){
      // offline / demo: skip straight to the code step (any code works there)
      app.setUI({ authStep:'code', authPhone:phone, otpCode:'' });
      toast('وضع تجريبي — أدخل أي رمز');
      return;
    }
    app.setUI({ authBusy:true });
    try{
      await TB.sendPhoneOtp(phone);
      app.setUI({ authStep:'code', authPhone:phone, authBusy:false, otpCode:'' });
      // U+2066 (LRI) / U+2069 (PDI) isolate the LTR phone number from the
      // surrounding Arabic so leading "+" and digits don't get bidi-reordered.
      toast('أرسلنا رمز التحقق إلى ⁦'+phone+'⁩ ✉️');
    }catch(err){
      app.setUI({ authBusy:false });
      try{ console.error('[otp-send]', err); }catch(_){}
      toast(((TB.friendlyError&&TB.friendlyError(err))||'ما قدرنا نرسل الرمز'));
    }
  };

  // --- CODE STEP: verify the SMS code + sign in ------------------------------
  const verify = async ()=>{
    // Read the CONTROLLED code from s.ui.otpCode (survives re-renders), DOM fallback.
    const elc=(typeof document!=='undefined')&&document.getElementById('f_otp'); const code=String((elc&&elc.value)?elc.value:(s.ui.otpCode||'')).replace(/[^0-9]/g,'');
    if(code.length<4){ toast('أدخل الرمز'); return; }
    const phone=s.ui.authPhone;
    const TB=(typeof window!=='undefined') && window.TalaqaBackend;
    if(!(TB && TB.enabled && TB.verifyPhoneOtp)){
      // offline / demo: accept any code and route into the first-word "wow"
      app.set({ authed:true, user:Object.assign({}, s.user, { phone }) });
      go('taste',{},{resetStack:true});
      return;
    }
    app.setUI({ authBusy:true });
    try{
      await TB.verifyPhoneOtp(phone, code);
      // CRITICAL: do NOT mark _restored or route as a new user on a transient
      // loadProgress failure. The previous shape (try/catch swallowing the
      // error, then app._restored=true and isNew=true) would route a returning
      // user to onboarding and let the next autosave clobber their real cloud
      // progress with an empty blob. Now: if loadProgress THROWS we surface
      // a retry toast and let the user try again — same defense as the boot
      // path. Only on a successful load do we mark _restored and route.
      let patch;
      try{ patch = await TB.loadProgress(); }
      catch(loadErr){
        app.setUI({ authBusy:false });
        try{ console.error('[otp-verify:load]', loadErr); }catch(_){}
        toast('تعذّر تحميل تقدمك، حاول مرة ثانية');
        return;
      }
      app._restored = true;
      app.set(Object.assign({ authed:true }, patch||{}, { user:Object.assign({}, app.state.user, (patch&&patch.user)||{}, { phone }) }));
      // Server-authoritative isNew. Prefer profiles.onboarding_completed
      // (set by complete_onboarding RPC); fall back to the legacy heuristic
      // only if the server flag is absent (older profiles, offline path).
      const isNew = (patch && typeof patch._serverOnboardingCompleted === 'boolean')
        ? !patch._serverOnboardingCompleted
        : !(patch && patch.level);
      // Referral: link a brand-new user to their inviter (best-effort), then consume the code.
      // Server-side claim_referral has its own new-user gate (0020) so a stale
      // client guess can no longer hijack the referrer's link.
      try{ const pend=app.state.pendingRef; if(isNew && pend && TB.claimReferral){ TB.claimReferral(pend); } if(pend) app.set({ pendingRef:'' }); }catch(_){}
      if(isNew){ go('taste',{},{resetStack:true}); }   // brand-new -> first-word wow -> onboarding (collects name)
      else { if(typeof restoreCurrentChapter==='function') restoreCurrentChapter(); go('home',{},{resetStack:true}); }
    }catch(err){
      app.setUI({ authBusy:false });
      try{ console.error('[otp-verify]', err); }catch(_){}
      toast(((TB.friendlyError&&TB.friendlyError(err))||'ما قدرنا نتحقق'));
    }
  };

  const brandHeader = h('div',{style:{ display:'flex', flexDirection:'column', alignItems:'center', marginTop:'18px', marginBottom:'24px','--i':0 }},
    h('div',{style:{ width:'76px', height:'76px', borderRadius:'24px', background:`linear-gradient(150deg,${T.P},${T.PD})`, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 10px 0 ${T.PD}` }}, brandMark({ size:46, spark:'#fff', trail:'#ffd43b' })),
    h('div',{style:{ fontSize:'26px', fontWeight:900, marginTop:'14px' }}, codeStep?'أدخل الرمز':'دخول'),
    h('div',{style:{ fontSize:'13.5px', color:T.mut, fontWeight:600, marginTop:'4px', textAlign:'center', lineHeight:1.7, maxWidth:'290px' }},
      codeStep
        ? h('span',null,'أرسلنا رمزًا إلى ', h('span',{class:'en', style:{ direction:'ltr', display:'inline-block', fontWeight:800, color:T.ink }}, s.ui.authPhone||''))
        : 'نتحقق منك عن طريق رمز بالجوال'));

  // PHONE STEP body: the row is forced LTR so the country-code picker sits on the
  // LEFT and the number fills the rest on its right (natural "+966 5XXXXXXXX" order).
  // The picker opens a custom on-brand bottom sheet (countrySheet) instead of the
  // OS <select> dropdown — searchable, with flag/name/dial-code rows.
  const ccISO = s.ui.ccISO || 'SA';
  const ccObj = CC_MAP[ccISO] || CC_MAP.SA;
  const ccTrigger = h('button',{ class:'press', type:'button', 'aria-label':'رمز الدولة', onClick:()=>app.setUI({ ccOpen:true, ccSearch:'' }),
    style:{ width:'118px', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', gap:'7px',
      background:'#fff', border:`2px solid ${T.line}`, borderRadius:'16px', padding:'15px 8px', cursor:'pointer' } },
    flagImg(ccObj.i, {w:26, h:18}),
    h('span',{ class:'en', style:{ fontWeight:800, fontSize:'16px', color:T.ink } }, ccObj.d),
    ico('chevD',{ size:15, sw:2.5, color:T.mut }));
  const phoneBody = h('div',{style:{ display:'flex', flexDirection:'column', gap:'8px','--i':1 }},
    h('div',{style:{ display:'flex', gap:'8px', direction:'ltr' }},
      ccTrigger,
      h('input',{ id:'f_phone', type:'tel', inputmode:'numeric', class:'field en', dir:'ltr', placeholder:'5XXXXXXXX',
        value:s.ui.phoneNum||'',
        // M8: clear the inline error as soon as the user starts editing again
        // so the message disappears the moment they correct the input.
        onInput:(e)=>{ app.state.ui.phoneNum=String(e.target.value||'').replace(/[^0-9]/g,''); if(app.state.ui.phoneErr){ app.state.ui.phoneErr=null; if(app.notify) app.notify(); } },
        style:{ flex:1, textAlign:'left' } })),
    // M8: persistent inline error under the field — survives the 1s toast so
    // mobile users who looked away still see what went wrong.
    s.ui.phoneErr ? h('div',{style:{ fontSize:'12.5px', color:T.bad, fontWeight:800, textAlign:'start', paddingInlineStart:'4px' }}, s.ui.phoneErr) : null);

  // CODE STEP body: a single big 6-digit field + change-number / resend links
  const codeBody = h('div',{style:{ display:'flex', flexDirection:'column', gap:'14px','--i':1 }},
    h('input',{ id:'f_otp', type:'tel', inputmode:'numeric', class:'field en', dir:'ltr', placeholder:'••••••', maxlength:'6', autocomplete:'one-time-code',
      value:s.ui.otpCode||'', onInput:(e)=>{ app.state.ui.otpCode=String(e.target.value||'').replace(/[^0-9]/g,'').slice(0,6); },
      style:{ textAlign:'center', fontSize:'30px', fontWeight:900, letterSpacing:'.5em', paddingInlineStart:'.5em' } }),
    h('div',{style:{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:'10px' }},
      h('button',{class:'press', onClick:()=>app.setUI({ authStep:'phone' }), style:{ color:T.mut, fontWeight:800, fontSize:'13px' }},'غير الرقم'),
      h('button',{class:'press', onClick:sendCode, style:{ color:T.P, fontWeight:800, fontSize:'13px' }},'أرسل الرمز مرة ثانية')));

  return frame(
    statusBar(),
    body({pad:'10px 22px 0', gap:0},
      brandHeader,
      codeStep ? codeBody : phoneBody,
    ),
    footer(
      bigBtn(busy ? 'شوي...' : (codeStep?'دخول':'أرسل الرمز'), { onClick:(codeStep?verify:sendCode), icon:'arrowL', disabled:busy }),
      h('div',{style:{ textAlign:'center', color:T.faint, fontSize:'12px', fontWeight:700, marginTop:'12px' }},'بالمتابعة، أنت توافق على الشروط وسياسة الخصوصية')
    ),
    (!codeStep && s.ui.ccOpen) ? countrySheet(s) : null
  );
};

SCREENS.placement = (s)=>{
  // Progress lives in PERSISTED app.state.placeState so pressing X (or leaving)
  // resumes instead of restarting. Initialize on the fly when absent (harness-safe).
  let ps=s.placeState;
  if(!ps || !ps.qs || !ps.qs.length){ ps={ qs:buildPlacementSet(), i:0, byLevel:{} }; app.state.placeState=ps; }
  const QS=ps.qs, i=clamp(ps.i||0, 0, QS.length-1), q=QS[i]||QS[0];
  return mcqScreen({
    grade:false,
    progress:i/QS.length,
    label:`سؤال ${ar(i+1)} من ${ar(QS.length)}`,
    onClose:()=>go('placement_intro'),   // X keeps placeState so it persists
    prompt:q.prompt,
    choices:q.choices,
    enChoices: !!q.en,
    dontKnow: true,
    continueLabel: i===QS.length-1 ? 'خلصنا' : 'التالي',
    onContinue:(sel)=>{
      // mcqScreen(grade:false) passes the raw selected index — compare it to the
      // question's real answer so placement scores correctness, not "any pick".
      const correct = (sel === q.answer);
      // accumulate correct-by-level (on a COPY) so we can place by the content's rubric
      const acc=Object.assign({}, ps.byLevel||{});
      const lv=q.level||'A1'; acc[lv]=Object.assign({c:0,t:0}, acc[lv]); acc[lv]={ c:acc[lv].c+(correct?1:0), t:acc[lv].t+1 };
      if(i+1<QS.length){ app.set({ placeState:{ qs:QS, i:i+1, byLevel:acc } }); go('placement'); }
      else {
        const level=scorePlacement(acc);
        // reset currentChapter so the learner restarts at the FIRST unit of their
        // (possibly new) level — "ابدأ أول وحدة" after taking/redoing the test.
        app.set({ level, isBeginner: level==='beginner', placeState:null, currentChapter:null });
        app.forceSave();   // persist the determined level immediately
        go('placement_result',{},{resetStack:true});
      }
    }
  });
};

/* ===================== PROGRESS HELPERS ===================== */
function wordDone(w){ return w.spell && w.pron && w.mean; }
function wordsAllDone(){ return app.state.words.every(wordDone); }
function firstIncompleteWord(){ const i=app.state.words.findIndex(w=>!wordDone(w)); return i<0?0:i; }
function sectionsDoneCount(){ return SECTION_ORDER.filter(k=>app.state.sections[k]==='done').length; }
function startWords(){
  // Warm the TTS cache for ALL 5 of the chapter's words up front so the first tap
  // on any word plays instantly (not just word[0]). Guarded + fire-and-forget.
  try{ if(typeof prefetchAllWords==='function') prefetchAllWords(); }catch(_){}
  // Resume EXACTLY where the learner left off in the word flow (so pressing X and
  // coming back doesn't restart the word from its teaching screen).
  const sp=app.state.savedPosition;
  const WORDFLOW={ word_teach:1, word_spell:1, word_pron:1, word_mean:1, bridge:1, full_quiz:1, words_review:1 };
  if(sp && WORDFLOW[sp.screen] && !wordsAllDone()){ go(sp.screen, sp.params||{}); return; }
  if(!wordsAllDone()) go('word_teach',{i:firstIncompleteWord()});
  else if(!app.state.fullQuizDone) go('bridge',{kind:'words_quiz'});
  else go('words_review');
}
function launchSection(id){
  markPosition('unit_hub',{});
  // Free-tier daily-section gate (migration 0020). Native + IAP-enabled only —
  // web stays unrestricted until/unless we wire a web billing path. Paid users
  // get a server free-pass via is_entitled(). On a server glitch the RPC
  // returns null and we let the user through (fail-open on the web; native has
  // its own offline behavior).
  const _open = ()=>{
    if(typeof ensureCurrentLesson==='function') ensureCurrentLesson();
    if(id==='words') startWords();
    else if(id==='listening') go('listen_clip',{i:0});
    else if(id==='reading') go('reading',{i:0});
    else if(id==='conversation') go('convo_intro');
    else if(id==='grammar') go('grammar_lesson');
  };
  try{
    const _iapOn = (typeof IAP!=='undefined') && IAP.available && IAP.available();
    const TB = (typeof window!=='undefined') && window.TalaqaBackend;
    if(!_iapOn || !TB || !TB.enabled || typeof TB.consumeDailySection!=='function' || !app.state.authed){
      _open(); return;
    }
    // Already known-entitled in this session? Skip the round-trip.
    if(app.state.entitled){ _open(); return; }
    Promise.resolve(TB.consumeDailySection()).then(r=>{
      if(!r){ _open(); return; }                          // transport blip: don't block
      if(r.entitled){ if(!app.state.entitled) app.set({entitled:true}); _open(); return; }
      if(r.allowed){ _open(); return; }
      // Daily limit hit — route to paywall with the "tomorrow OR subscribe" UX.
      app.setUI({ paywallReason:'daily_limit' });
      go('paywall');
    }).catch(()=>{ _open(); });
  }catch(_){ _open(); }
}
/* today's calendar day as a stable string key. Pure Date logic — runs under Node too. */
function dayStr(){ return new Date().toDateString(); }
/* SINGLE SOURCE for all XP. Tracks lifetime xp + per-day xpToday (auto-resets on a new
   day) and fires the daily-goal celebration once. Harness-safe (no window needed). */
/* Simple ISO-week bucket: a 7-day window keyed off the epoch. Pure Date math so it
   runs under Node too. Used to roll weekly XP for the home recap chip. */
function weekKeyNow(){ try{ return 'W'+Math.floor(Date.now()/(7*864e5)); }catch(_){ return 'W0'; } }
function awardXp(n){
  n=n||0; if(n<=0){ return; }
  const today=dayStr();
  const patch={};
  let xt=app.state.xpToday||0;
  if(app.state.xpDay!==today){ xt=0; patch.xpDay=today; }
  xt+=n;
  patch.xpToday=xt;
  patch.xp=(app.state.xp||0)+n;
  // roll weekly XP the same way: reset when the ISO-week bucket changes, then add n.
  const wk=weekKeyNow();
  let wx=app.state.weekXp||0;
  if(app.state.weekKey!==wk){ wx=0; patch.weekKey=wk; }
  wx+=n;
  patch.weekXp=wx;
  app.set(patch);
  maybeGoalMet();
  if(typeof evalAchievements==='function') evalAchievements();
  if(typeof checkMilestones==='function') checkMilestones();
}
/* celebrate the daily goal the first time it's reached on a given day. */
function maybeGoalMet(){
  const today=dayStr();
  const goal=app.state.dailyGoal||50;
  if((app.state.xpToday||0)>=goal && app.state.goalMetDay!==today){
    app.set({goalMetDay:today});

    toast('🎯 هدف اليوم مكتمل! أحسنت');

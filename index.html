/* the calendar day before `d` (a Date), as a toDateString() */
function yesterday(d){ const y=new Date(d.getTime()); y.setDate(y.getDate()-1); return y.toDateString(); }
/* Honest daily streak. Consecutive day = +1; ANY missed day breaks the streak
   (no silent freezes, no magical repair). `repairFrom` keeps the prior streak
   value purely for an informational "كانت سلسلتك X يوم" display — it cannot be
   used to restore the streak. Pure Date logic so it runs under Node too. */
function touchStreak(){
  const d=new Date();
  const today=d.toDateString();
  const yest=new Date(d.getTime()-864e5).toDateString();
  const last=app.state.lastActiveDay;
  if(last===today) return;                                   // already active today: no-op
  let streak;
  const patch={};
  if(last===yest || last===''){                              // consecutive day / first ever
    streak=(app.state.streak||0)+1;
  } else {                                                   // any gap of 1+ days → broken
    patch.repairFrom=(app.state.streak||0);
    streak=1;
  }
  patch.streak=streak;
  patch.lastActiveDay=today;
  patch.longestStreak=Math.max(app.state.longestStreak||0, streak);
  app.set(patch);
  if(typeof checkMilestones==='function') checkMilestones();
  if(typeof evalAchievements==='function') evalAchievements();
}
/* Expire a stale streak at boot/visibility-resume. If the user opens the app and
   their last activity was older than yesterday, the streak is broken NOW — not
   only when they complete a section. Without this, home would display the old
   streak number until they did something, which made users feel the streak was
   "running on its own". The number gets stashed in `repairFrom` for an
   informational "كانت سلسلتك X يوم" message. */
function expireStaleStreak(){
  try{
    const s=app.state; if(!s) return;
    const last=s.lastActiveDay; if(!last) return;
    const d=new Date();
    const today=d.toDateString();
    const yest=new Date(d.getTime()-864e5).toDateString();
    if(last===today || last===yest) return;                   // still valid
    if((s.streak||0)<=0) return;                              // already broken
    app.set({ streak:0, repairFrom:(s.repairFrom||s.streak||0), lastActiveDay:'' });
  }catch(_){}
}

/* ===================== MILESTONES & ACHIEVEMENTS ===================== */
/* threshold ladders — crossing one (once, ever) queues a milestone celebration screen */
const MILESTONES = { streak:[3,7,14,30,50,100], xpTotal:[100,500,1000,5000,15000], words:[10,50,100,300] };

/* Compare current state to MILESTONES; for each threshold newly crossed (and not yet
   stamped in hitMilestones) mark it + queue a celebration. Fires once per threshold.
   Harness-safe: go()/document only touched if available; never throws. */
function checkMilestones(){
  const s=app.state, hit=Object.assign({}, s.hitMilestones||{});
  const cur={ streak:s.longestStreak||s.streak||0, xpTotal:s.xp||0, words:s.wordsLearned||0 };
  let changed=false;
  Object.keys(MILESTONES).forEach(kind=>{
    MILESTONES[kind].forEach(v=>{
      const key=kind+':'+v;
      if(cur[kind]>=v && !hit[key]){ hit[key]=true; changed=true; app._mileQ.push({ kind, value:v }); }
    });
  });
  if(changed) app.set({ hitMilestones:hit });
  // surface the next queued celebration (unless we're already on it)
  if(app._mileQ.length && app.state.screen!=='milestone' && typeof go==='function'){
    const next=app._mileQ.shift();
    go('milestone', next);
  }
}

/* Stamp any newly-earned achievement with a date, toast + a small confetti burst.
   Called after XP/streak/word changes. Only writes state when something actually
   unlocked, so it can't loop. Harness-safe (toast/confettiRain are document-guarded). */
function evalAchievements(){
  const s=app.state, map=Object.assign({}, s.unlockedAchv||{});
  let changed=false, lastAr='';
  for(const a of ACHIEVEMENTS){
    if(!map[a.id]){ try{ if(a.test(s)){ map[a.id]=new Date().toISOString(); changed=true; lastAr=a.ar; } }catch(_){} }
  }
  if(!changed) return;
  app.set({ unlockedAchv:map });
  try{ toast('🏅 إنجاز جديد: '+lastAr); }catch(_){}
  try{ if(typeof confettiRain==='function' && typeof document!=='undefined'){ const c=confettiRain(20); const root=document.getElementById('app'); if(root&&c){ root.appendChild(c); setTimeout(()=>{ try{ c.remove(); }catch(_){} },3400); } } }catch(_){}
}

/* Finish the whole chapter/unit: mark it complete, promote the level if it was the
   last unit (or graduate a beginner out of Foundations), persist, then celebrate.
   Called AFTER the last step of the unit (grammar, or writing when the chapter has
   a writing task). */
function completeChapter(){
  const cur=app.state.currentChapter;
  if(cur) app.set({ doneChapters: Object.assign({}, app.state.doneChapters, { [cur]:true }) });
  try{
    if(app.state.isBeginner){
      const fnd=chaptersFor('FND'), dc=app.state.doneChapters||{};
      if(fnd.length && fnd.every(ch=>dc[chapterKey(ch)])){ app.set({ isBeginner:false, level:'A1', currentChapter:null }); try{ toast('🎉 خلّصت الأساسيات — يلا نبدأ A1!'); }catch(_){} }
    }
    maybeLevelUp();   // promote (with toast) if this was the level's last unit
  }catch(_){}
  try{ if(app.forceSave) app.forceSave(); }catch(_){}
  go('unit_complete',{},{resetStack:true});
}
/* mark a section done, unlock the next, return to hub */
function completeSection(id, toHub){
  touchStreak();
  const sec=Object.assign({}, app.state.sections); sec[id]='done';
  const idx=SECTION_ORDER.indexOf(id), next=SECTION_ORDER[idx+1];
  if(next && sec[next]==='locked') sec[next]='current';
  app.set({ sections:sec });
  if(id==='grammar'){
    // Writing is the FINAL step of a real unit: it is NOT finished until the writing
    // task is done. Route there first; the chapter completes after writing.
    if(app.state.currentChapter && app._writing){ markPosition('writing',{}); go('writing',{},{resetStack:true}); return; }
    completeChapter(); return;
  }
  if(toHub!==false) go('unit_hub',{},{resetStack:true});
}

/* refresh the real leaderboard (guarded, fire-and-forget). notifies on resolve so
   newly-fetched real users appear. */
/* True when the user is typing in / interacting with a form control. Background
   refreshes skip their re-render then, so they don't recreate the node and close an
   open native picker (e.g. the reminder <input type="time">). */
function inputFocused(){ try{ const a=document.activeElement; return !!(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)); }catch(_){ return false; } }
function refreshLeaderboard(){
  try{
    const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
    if(!TB || !TB.enabled || typeof TB.getLeaderboard!=='function') return;
    // one-time: push an existing local photo to the server so it shows for others
    if(!app._avatarSynced && app.state.user && app.state.user.photo){ app._avatarSynced=true; try{ syncAvatarToServer(app.state.user.photo); }catch(_){} }
    // one-time: push the local name so the leaderboard shows the REAL name (not the
    // "متعلّم" fallback). Self-heals accounts whose name never persisted to the server.
    if(!app._nameSynced && app.state.user && (app.state.user.name||'').trim() && typeof TB.saveDisplayName==='function'){
      app._nameSynced=true; try{ TB.saveDisplayName(app.state.user.name); }catch(_){}
    }
    // throttle: at most once per 30s so the notify()-triggered re-render of home
    // doesn't re-fire the fetch in a loop.
    const now=Date.now();
    if(app._lbBusy) return;
    if(app._lbAt && (now-app._lbAt)<30000) return;
    app._lbBusy=true; app._lbAt=now;
    Promise.resolve(TB.getLeaderboard(10)).then(()=>{ app._lbBusy=false; if(app.notify && !inputFocused()) app.notify(); })
      .catch(()=>{ app._lbBusy=false; });
  }catch(_){}
}

function levelName(s){ return s.isBeginner ? 'مبتدئ' : (s.level || 'A1'); }
/* Derived Arabic rank title from progress (no new state). A long streak earns a
   special badge; otherwise the title climbs with words learned. */
function titleFor(s){
  s=s||{};
  if((s.longestStreak||s.streak||0)>=30) return 'صاحب السلسلة 🔥';
  const w=s.wordsLearned||0;
  const levelWeight = s.isBeginner ? 0 : ({A1:1,A2:2,B1:3,B2:4,C1:5}[s.level]||0);
  const score = levelWeight*40 + w;
  if(score<50)  return 'متعلّم مبتدئ';
  if(score<150) return 'مستكشف';
  if(score<350) return 'متحدّث واثق';
  return 'بطل الطلاقة';
}
function levelCard(s){
  let total, doneU;
  if(_curr()){
    // real curriculum: count this level's completed chapters out of the level's size
    const lvl = s.isBeginner ? 'FND' : (s.level||'A1');
    total = (chaptersFor(lvl).length||50);
    doneU = Object.keys(s.doneChapters||{}).filter(k=>k.split(':')[0]===lvl).length;
  } else {
    total=50; doneU = s.unitDone ? 1 : 0;
  }
  const remaining=Math.max(total-doneU,0), pct=Math.round(doneU/total*100);
  return card({ style:{'--i':2 }, p:15 },
    h('div',{style:{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }},
      h('div',{style:{ display:'flex', alignItems:'center', gap:'9px' }},

        h('div',{style:{ fontSize:'10.5px', color:T.mut, fontWeight:800 }},'وحدة متبقّية'))),
    h('div',{style:{ height:'12px', borderRadius:'99px', background:T.bg, border:`1.5px solid ${T.line}`, overflow:'hidden' }},

    h('div',{style:{ fontSize:'12px', color:T.mut, fontWeight:700, marginTop:'8px', textAlign:'center' }},

/* ===================== JOURNEY ===================== */
/* Build the ordered list of real chapters for the learner (browser only). */
function journeyChapters(s){
  const list=[];
  if(s.isBeginner){ list.push(...chaptersFor('FND')); }
  const lvl=s.level||'A1';
  if(lvl!=='FND') list.push(...chaptersFor(lvl));
  return list;
}
SCREENS.journey = (s)=>{
  const useReal = !!_curr();
  if(useReal){
    const chapters=journeyChapters(s);
    const done=s.doneChapters||{};
    // sequential locking: done if recorded; first not-done is current; rest locked
    let foundCurrent=false;
    const rows=chapters.map((ch,idx)=>{
      const key=chapterKey(ch); let status;
      if(done[key]){ status='done'; }
      else if(!foundCurrent){ status='current'; foundCurrent=true; }
      else { status='locked'; }
      return chapterCard(ch, status, idx);
    });
    return frame(
      statusBar(),
      body({pad:'8px 18px 14px'},
        appBar('الرحلة','كمّل الفصول واحد بعد الثاني'),
        levelCard(s),
        rows.length
          ? h('div',{style:{ position:'relative','--i':1 }},
              h('div',{style:{ position:'absolute', insetInlineStart:'33px', top:'30px', bottom:'30px', width:'3px',
                background:`repeating-linear-gradient(${T.line} 0 7px, transparent 7px 14px)`, zIndex:0 }}),
              h('div',{style:{ display:'flex', flexDirection:'column', gap:'13px', position:'relative', zIndex:1 }}, ...rows))
          : card({ p:22, style:{'--i':1} }, h('div',{style:{ textAlign:'center', color:T.mut, fontWeight:700, lineHeight:1.8 }},'ما في فصول لهذا المستوى الحين.')),
      ),
      nav('journey')
    );
  }
  // ---- demo / harness path (no window.CURRICULUM): unchanged original behavior ----
  const curUnit = s.unitDone ? 2 : 1;
  const statusOf=(u)=>{
    if(u.kind==='found') return s.isBeginner ? (s.didFoundations?'done':'current') : 'done';
    if(u.n < curUnit) return 'done';
    if(u.n === curUnit) return 'current';
    return 'locked';
  };
  return frame(
    statusBar(),
    body({pad:'8px 18px 14px'},

/* Premium entitlement — SERVER is the single source of truth (H6).

     2) premium_until — referral-earned months (server reconciles this into
                        is_entitled too; kept for offline UX before the
                        round-trip completes).

   gates content or drives the "active premium" UI by itself, because the

   entitled=false / premium_until=null and Settings still showed "مفعل". */

/* Refresh the caller's referral stats (code + progress + premium_until) from the
   server — fire-and-forget + throttled, like refreshLeaderboard. */
function refreshReferralStats(){
  try{
    const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
    if(!TB || !TB.enabled || typeof TB.getReferralStats!=='function' || !app.state.authed) return;
    const now=Date.now();
    if(app._refBusy) return;
    if(app._refAt && (now-app._refAt)<30000) return;
    app._refBusy=true; app._refAt=now;
    Promise.resolve(TB.getReferralStats()).then(st=>{ app._refBusy=false; if(st && !inputFocused()){ app.set({ referralStats:st, premium_until: st.premium_until||null }); } else if(st){ app._refAt=0; } })
      .catch(()=>{ app._refBusy=false; });
  }catch(_){}
}

/* Push a SMALL (96px) copy of the user's photo to the server so it appears in the
   leaderboard for other people. Resized down to keep the leaderboard payload tiny. */
function syncAvatarToServer(dataUrl){
  try{
    const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
    if(!(TB&&TB.enabled&&TB.saveAvatar)) return;
    if(!dataUrl){ TB.saveAvatar(null); return; }
    if(typeof Image==='undefined' || typeof document==='undefined'){ TB.saveAvatar(dataUrl); return; }
    const img=new Image();
    img.onload=()=>{ try{
        const max=96, sc=Math.min(max/img.width, max/img.height, 1), w=Math.round(img.width*sc)||max, hh=Math.round(img.height*sc)||max;
        const cv=document.createElement('canvas'); cv.width=w; cv.height=hh;
        cv.getContext('2d').drawImage(img,0,0,w,hh);
        TB.saveAvatar(cv.toDataURL('image/jpeg',0.8));
      }catch(_){ try{ TB.saveAvatar(dataUrl); }catch(_2){} } };
    img.onerror=()=>{ try{ TB.saveAvatar(dataUrl); }catch(_){} };
    img.src=dataUrl;
  }catch(_){}
}
/* Push the learner's display name to the account so the leaderboard shows their

}

/* ===================== SHAREABLE PROGRESS CARD (viral loop) ===================== */
/* Draw a 1080×1350 progress card to an offscreen canvas, then share it as a PNG
   image (Web Share with files) or fall back to a download. EVERYTHING is guarded:
   in the Node harness there is no document/canvas/navigator.share, so this is a
   clean no-op. Only ever invoked from a button tap (never at render time). */
function shareProgress(s){
  s=s||(app&&app.state)||{};
  try{
    if(typeof document==='undefined' || !document.createElement){ try{ toast('المشاركة ما متاحة هنا'); }catch(_){} return; }
    const W=1080, H=1350;
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const ctx=cv.getContext && cv.getContext('2d');
    if(!ctx || !ctx.fillRect){ try{ toast('المشاركة ما متاحة هنا'); }catch(_){} return; }

    // emerald → teal vertical gradient background
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0f9d6e'); g.addColorStop(0.55,'#0c8f78'); g.addColorStop(1,'#0a6f6a');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // soft glow blobs
    try{ ctx.globalAlpha=0.10; ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(W-120,160,260,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(120,H-120,300,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }catch(_){}

    // RTL Arabic text: anchor right, draw from the right margin inward.
    const RX=W-90;            // right margin (text anchor)
    ctx.textAlign='right'; ctx.textBaseline='alphabetic'; ctx.direction='rtl';
    const fam="'Cairo','Tajawal',system-ui,sans-serif";

    // app name
    ctx.fillStyle='#ffffff'; ctx.font="900 86px "+fam;
    ctx.fillText('طلاقة', RX, 180);
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font="700 38px "+fam;
    ctx.fillText('أتعلم الإنجليزية', RX, 240);

    // user name + level
    ctx.fillStyle='#ffffff'; ctx.font="900 60px "+fam;
    ctx.fillText((s.user&&s.user.name)||'صديقي', RX, 360);
    const lvl = s.isBeginner ? 'مبتدئ' : ((s.level)||'A1');
    ctx.fillStyle='rgba(255,255,255,.92)'; ctx.font="800 40px "+fam;
    try{ ctx.fillText('المستوى: '+lvl+'  •  '+titleFor(s), RX, 420); }catch(_){ ctx.fillText('المستوى: '+lvl, RX, 420); }

    // big streak hero
    ctx.textAlign='center';
    ctx.fillStyle='#ffffff'; ctx.font="900 240px "+fam;
    ctx.fillText('🔥', W/2, 720);
    ctx.font="900 130px "+fam;
    ctx.fillText(String(s.streak||0), W/2, 880);
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font="800 46px "+fam;
    ctx.fillText('يوم متتالي', W/2, 950);

    // stat row: words / xp  (two rounded chips)
    const chips=[
      { v:String(s.wordsLearned||0), l:'كلمة' },
      { v:String(s.xp||0),           l:'نقطة خبرة' },
    ];
    const cw=420, ch=170, gap=40, totalW=cw*2+gap, startX=(W-totalW)/2, cy=1060;
    chips.forEach((c,i)=>{
      const x=startX+i*(cw+gap);
      try{ ctx.fillStyle='rgba(255,255,255,.15)';
        if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,cy,cw,ch,30); ctx.fill(); }
        else ctx.fillRect(x,cy,cw,ch);
      }catch(_){ ctx.fillRect(x,cy,cw,ch); }
      ctx.textAlign='center';
      ctx.fillStyle='#ffffff'; ctx.font="900 80px "+fam;
      ctx.fillText(c.v, x+cw/2, cy+95);
      ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font="700 38px "+fam;
      ctx.fillText(c.l, x+cw/2, cy+145);
    });

    // footer tagline
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.95)'; ctx.font="800 42px "+fam;
    ctx.fillText('يلا تعلّم الإنجليزية معي! 🚀', W/2, H-90);

    const TAGLINE='أتعلّم الإنجليزية مع طلاقة! 🔥';
    // Prefer Web Share with a file; else download the PNG.
    const canFileShare=(typeof navigator!=='undefined') && navigator.share && navigator.canShare;
    if(canFileShare && cv.toBlob){
      cv.toBlob((blob)=>{
        try{
          if(!blob){ throw new Error('no blob'); }
          const file=new File([blob],'progress.png',{type:'image/png'});
          if(navigator.canShare({files:[file]})){
            navigator.share({ files:[file], text:TAGLINE, title:'طلاقة' }).catch(()=>{});
          } else { shareFallbackDownload(cv); }
        }catch(_){ shareFallbackDownload(cv); }
      },'image/png');
    } else {
      shareFallbackDownload(cv);
    }
  }catch(_){ try{ toast('ما اشتغلت المشاركة — جرّب مرة ثانية'); }catch(_2){} }
}
/* Fallback: trigger a PNG download via a temporary <a data-url>. Guarded. */
function shareFallbackDownload(cv){
  try{
    if(typeof document==='undefined' || !cv || !cv.toDataURL) return;
    const url=cv.toDataURL('image/png');
    const a=document.createElement('a');
    a.href=url; a.download='talaqa-progress.png';
    try{ if(document.body && document.body.appendChild) document.body.appendChild(a); }catch(_){}
    try{ a.click(); }catch(_){}
    try{ if(a.remove) a.remove(); }catch(_){}
    try{ toast('تم حفظ بطاقتك — شارك الحين! 📱'); }catch(_){}
  }catch(_){ try{ toast('ما اشتغل الحفظ'); }catch(_2){} }
}

/* ===================== WORD LOOP ===================== */
function setWordFlag(i, key){
  const words=app.state.words.map(w=>Object.assign({},w));
  const was=wordDone(words[i]); words[i][key]=true; const now=wordDone(words[i]);
  const patch={ words };
  if(!was && now){
    // record this word in the LIFETIME learned list (dedup by english) so the
    // "كلماتي" screen and the home counter always agree across chapters.
    const w=(typeof WORDS!=='undefined' && WORDS[i]) ? WORDS[i] : {};
    const lw=(app.state.learnedWords||[]).slice();
    // SRS-lite: stamp the entry with a review box + due date (box 1 = review tomorrow).
    if(w.en && !lw.some(x=>x.en===w.en)) lw.push({ en:w.en, ar:w.ar||'', ipa:w.ipa||'', translit:w.translit||'', at:Date.now(), due:Date.now()+864e5, box:1 });
    patch.learnedWords=lw;
    patch.wordsLearned=lw.length;
  }
  app.set(patch);
  if(typeof evalAchievements==='function') evalAchievements();
  if(typeof checkMilestones==='function') checkMilestones();
  if(!was && now){ awardXp(10); }   // XP via the single source, AFTER flags persist
}
const wordProg = (i, step)=> (i + step)/WORDS.length; // step 0..1 within a word's 4 stages

/* SRS-lite: learned words DUE for review. Older entries saved before the SRS
   fields existed (no `due`) count as due — backward compatible. */
function dueWords(){
  const now=Date.now();
  return (app.state.learnedWords||[]).filter(x=>x && x.en && (x.due==null || x.due<=now));
}

/* ===================== WEAK WORDS (mistake tracking) ===================== */
/* Record a miss on a real vocabulary word — bumps misses, resets the fix counter,
   and stamps the time. Used only by vocab quizzes (NOT comprehension questions). */
function recordMiss(en, ar, ipa){
  if(!en) return;
  const lw=(app.state.weakWords||[]).map(x=>Object.assign({},x));
  let e=lw.find(x=>x.en===en);
  if(!e){ e={en, ar:ar||'', ipa:ipa||'', misses:0, fixes:0, lastMiss:0}; lw.push(e); }
  e.misses++; e.fixes=0; e.lastMiss=Date.now();
  app.set({weakWords:lw});
}
/* Record a correct fix on a weak word — two clean fixes graduates it out of the list. */
function recordFix(en){
  const lw=(app.state.weakWords||[]).map(x=>Object.assign({},x));
  const e=lw.find(x=>x.en===en);
  if(!e) return;
  e.fixes=(e.fixes||0)+1;
  let next=lw;
  if(e.fixes>=2) next=lw.filter(x=>x.en!==en);
  app.set({weakWords:next});
}

/* ---- reusable SPELLING ui ---- */
function spellUI(cfg){
  const s=app.state, res=s.ui.spellResult, typed=s.ui.spellVal||'', tries=s.ui.spellTries||0;
  const norm=v=>String(v).toLowerCase().replace(/\s+/g,' ').trim();
  const playing=s.ui.playId==='sp';
  const check=()=>{
    const v=(document.getElementById('spellInput')||{}).value||'';
    if(!v.trim()){ toast('اكتب الكلمة الأولى'); return; }
    const nv=norm(v), na=norm(cfg.answer);
    // a near-miss (one space / one letter off; two for long words) is NOT wrong —
    // it's "قريب": gentle yellow, show the correct spelling, let them continue.
    const tol=na.length>=8?2:1;
    if(nv===na){ buzz(18); try{ SFX.correct(); }catch(_){} app.setUI({spellResult:'ok', spellVal:v}); }
    else if(nv && _editDist(nv,na)<=tol){ buzz(12); try{ SFX.correct(); }catch(_){} app.setUI({spellResult:'close', spellVal:v}); }
    else { buzz([10,40,10]); try{ SFX.wrong(); }catch(_){} if(cfg.onWrong){ try{ cfg.onWrong(); }catch(_){} } app.setUI({spellResult:'no', spellVal:v, spellTries:tries+1, spellReveal:false}); }
  };
  let bodyKids, foot;
  const head = card({ style:{'--i':1} },
    h('div',{style:{ display:'flex', alignItems:'center', gap:'13px' }},
      playButton({ size:50, playing, onClick:()=>{ app.setUI({playId:'sp'}); Audio2.speak(cfg.audioWord,()=>app.setUI({playId:null})); } }),
      h('div',{style:{ flex:1, textAlign:'center' }},
        h('div',{style:{ fontSize:'12px', color:T.mut, fontWeight:800 }},'الكلمة بالعربية'),
        h('div',{style:{ fontSize:'26px', fontWeight:900, color:T.PD }}, cfg.word))));
  if(res==='ok'){
    bodyKids=[ head, feedbackBox(true, cfg.answer, null) ];
    foot=bigBtn('كمّل', { bg:T.good, sh:T.goodD, pop:true, icon:'arrowL', onClick:cfg.onPass });
  } else if(res==='close'){
    bodyKids=[ head, feedbackBoxClose(cfg.answer, typed) ];
    foot=h('div',{style:{ display:'flex', gap:'10px' }},
      h('div',{style:{flex:1}}, bigBtn('جرّب مرة ثانية', { bg:'#fff', sh:T.line, color:T.Yink, iconBefore:'refresh', onClick:()=>app.setUI({spellResult:null}) })),
      h('div',{style:{flex:1}}, bigBtn('كمّل', { bg:T.Y, sh:T.Yd, color:T.Yink, icon:'arrowL', onClick:cfg.onPass })));
  } else if(res==='no'){
    bodyKids=[ head, feedbackBoxWrong(cfg.answer, typed, !!s.ui.spellReveal, ()=>app.setUI({spellReveal:true})) ];
    foot=h('div',{style:{ display:'flex', gap:'10px' }},
      h('div',{style:{flex:1}}, bigBtn('جرّب مرة ثانية', { bg:'#fff', sh:T.line, color:T.P, iconBefore:'refresh', onClick:()=>app.setUI({spellResult:null, spellReveal:false}) })),
      h('div',{style:{flex:1}}, bigBtn('كمّل', { icon:'arrowL', onClick:cfg.onPass })));
  } else {
    bodyKids=[ head,
      h('div',{style:{'--i':2}}, h('input',{ id:'spellInput', class:'field en', 'aria-label':'اكتب العبارة بالإنجليزية', placeholder:'اكتب هنا…', autocapitalize:'none', autocorrect:'off', spellcheck:'false', style:{ textAlign:'center', fontSize:'22px' } })),
      tries>=1 ? h('div',{style:{ textAlign:'center', color:T.mut, fontWeight:800, fontSize:'13px','--i':3 }}, 'تلميح: تبدأ بحرف ', h('span',{class:'en', style:{color:T.P, fontWeight:900}}, cfg.answer[0].toUpperCase())) : null,
    ];
    foot=bigBtn('تحقّق', { icon:'check', onClick:check });
  }
  return frame(
    statusBar(),
    lessonTop(cfg.progress, cfg.label, cfg.onClose),
    body({pad:'16px 20px 0', gap:'13px'},
      h('div',{style:{ fontSize:'20px', fontWeight:900,'--i':0 }},'اكتب العبارة بالإنجليزية'),
      ...bodyKids),
    footer(foot),
    res==='ok' ? celebrate() : null
  );

/* ---- reusable PRONUNCIATION ui (simulated scoring; backend will score real audio) ---- */
const PRON_PASS = 75;
function weakWord(word, weak, words){
  // REAL per-word feedback from the backend ({word, ok}[]): underline exactly the
  // word(s) the learner mispronounced. Falls back to the whole word in demo mode.
  if(Array.isArray(words) && words.length){
    const kids=[];
    words.forEach((w,i)=>{
      if(i) kids.push(' ');
      kids.push(w.ok ? h('span',null,w.word) : h('span',{class:'underwrong'},w.word));
    });
    return h('span',{class:'en', dir:'ltr'}, ...kids);
  }
  if(!weak) return h('span',{class:'en'}, word);
  return h('span',{class:'en'}, h('span',{class:'underwrong'}, word));
}
function pronUI(cfg){
  const s=app.state, st=s.ui.pron||'idle', score=s.ui.score, tries=s.ui.pronTries||0, playing=s.ui.playId==='mp';
  warmMicForScreen('pron:'+(cfg.label||cfg.display||''));   // first tap records instantly
  const startRec=()=>{
    app.setUI({ pron:'rec' });
    const TB=(typeof window!=='undefined')&&window.TalaqaBackend;
    if(TB&&TB.enabled){
      // Real pronunciation: record from the mic (tap-to-stop), then score. We
      // split record -> 'scoring' -> result so the user sees an honest spinner
      // during the network call instead of a fake "listening" state.
      TB._recordOnce(6000, { silenceMs:800 }).then(blob=>{
        if(app.state.ui.pron!=='rec'){ const e=new Error('cancelled'); e.__cancelled=true; throw e; }
        app.setUI({ pron:'scoring' });
        return TB.pronounce(blob, cfg.display);
      }).then(res=>{
        if(app.state.ui.pron!=='scoring') return;
        if(res.heard===false || (!res.transcript && (res.score||0)===0)){
          app.setUI({ pron:'idle' });
          toast('ما سمعنا صوت واضح — اقترب من المايك وجرّب مرة ثانية');
          return;
        }
        app.setUI({ pron:'done', score:res.score, weak: res.score<88, heard:res.transcript, pronWords:(Array.isArray(res.words)&&res.words.some(w=>!w.ok))?res.words:null });
        if(res.score<PRON_PASS && cfg.onFail){ try{ cfg.onFail(); }catch(_){} }
      }).catch(err=>{
        if(err&&err.__cancelled) return;
        if(app.state.ui.pron!=='rec' && app.state.ui.pron!=='scoring') return;
        app.setUI({ pron:'idle' });
        toast((TB.friendlyError&&TB.friendlyError(err))||'ما قدرنا نقيّم النطق — تحقّق من إذن المايك');

      const base=66+tries*10, sc=clamp(Math.round(base + (Math.random()*16-5)), 45, 99);

      h('div',{style:{ marginTop:'20px', fontWeight:900, fontSize:'16px', color:T.bad }},'…أنصت إليك'),
      h('div',{style:{ marginTop:'6px', fontSize:'12.5px', color:T.mut, fontWeight:700 }},'قول الكلمة — نوقف التسجيل تلقائياً، أو اضغط الدائرة'),
      h('div',{style:{ display:'flex', gap:'4px', justifyContent:'center', marginTop:'12px', height:'24px', alignItems:'flex-end' }},
        ...Array.from({length:9},(_,i)=>h('span',{class:'eqbar', style:{ background:T.bad, height:'100%', animation:`bars ${0.6+ (i%3)*0.15}s ease-in-out ${i*0.06}s infinite` }}))));
  } else if(st==='scoring'){
    center=h('div',{style:{ textAlign:'center' }},

      h('div',{style:{ marginTop:'20px', fontWeight:900, fontSize:'16px', color:T.P }},'نقيّم نطقك…'));

        h('div',{style:{ width:'104px', height:'104px', borderRadius:'50%', background:'#fff', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }},
          h('div',{class:'en', style:{ fontSize:'34px', fontWeight:900, color:scoreColor, lineHeight:1 }}, score),

      h('div',{style:{ marginTop:'16px', fontSize:'17px', fontWeight:900, color:scoreColor }}, passed?(score>=85?'نطق كفو! 🎉':'جيد جداً! 👍'):'يلا نحاول مرة ثانية'),

        ? h('div',{style:{ fontSize:'12.5px', color:T.mut, fontWeight:700, marginTop:'8px' }},'سمعنا: ', h('span',{class:'en', dir:'ltr'}, s.ui.heard))

SCREENS.full_quiz = (s)=>{
  const i=s.params.i||0, q=FULL_QUIZ[i];
  if(!q) return bounceFrame('اختبار الكلمات');
  const prog=(i)/FULL_QUIZ.length, label=`اختبار الكلمات • ${ar(i+1)}/${ar(FULL_QUIZ.length)}`;
  // resolve the real vocabulary word behind this question so a wrong answer can flag
  // it as weak. spell/pronounce carry the english in q.answer; spell/reverse show the
  // arabic in q.word; meaning/listen show the english in q.word — match on either.
  const _W=(typeof WORDS!=='undefined')?WORDS:[];
  const qEn=(q.type==='spell'||q.type==='pronounce')?q.answer:q.word;
  const qw=_W.find(w=>w && (String(w.en||'').toLowerCase()===String(qEn||'').toLowerCase() || w.ar===q.word)) || null;
  const flagWeak=()=>{ if(qw) recordMiss(qw.en, qw.ar, qw.translit||qw.ipa); };
  // always advance (no soft-lock); only award XP for a correct answer.
  const next=(ok)=>{ if(ok) awardXp(5);
    if(i+1<FULL_QUIZ.length) go('full_quiz',{i:i+1}); else { app.set({fullQuizDone:true}); go('summary',{id:'words'},{resetStack:true}); } };
  const onClose=()=>go('unit_hub',{},{resetStack:true});
  if(q.type==='spell'){
    return spellUI({ word:q.word, answer:q.answer, audioWord:q.answer, progress:prog, label, onClose, onWrong:flagWeak, onPass:next });
  }
  if(q.type==='pronounce'){
    return pronUI({ display:q.word, ipa:'', progress:prog, label, onClose, onFail:flagWeak, onPass:next });
  }
  // choice-based: meaning | reverse | listen
  let promptNode=null, enChoices=false;
  if(q.type==='meaning'){ promptNode=wordPlayCard(q.word); }
  else if(q.type==='reverse'){ promptNode=h('div',{style:{ background:T.Psoft, borderRadius:'22px', padding:'18px', textAlign:'center', fontSize:'28px', fontWeight:900, color:T.PD }}, q.word); enChoices=true; }
  else if(q.type==='listen'){ const playing=s.ui.playId==='q';
    promptNode=h('div',{style:{ display:'flex', flexDirection:'column', alignItems:'center', gap:'10px', background:T.Psoft, borderRadius:'22px', padding:'20px' }},
      playButton({ size:64, playing, onClick:()=>{ app.setUI({playId:'q'}); Audio2.speak(q.word,()=>app.setUI({playId:null})); } }),
      h('div',{style:{ fontSize:'13px', color:T.mut, fontWeight:800 }},'اضغط لاسمع')); enChoices=true; }
  const sq=shuffledMcq(s, 'fq'+i, q.choices, q.answer);                 // fresh order every entry
  return mcqScreen({ progress:prog, label, onClose, prompt:q.prompt, promptNode, choices:sq.choices, answer:sq.answer, enChoices, onWrong:flagWeak, onContinue:next });
};

/* ===================== SMART REVIEW (SRS-lite over due learned words) ===================== */
SCREENS.review = (s)=>{
  // Build the 5-question session ONCE per entry (kept in s.ui so sel/revealed
  // re-renders don't reshuffle; go() resets ui -> a fresh session next time).
  let R=s.ui._rev;
  if(!R){
    const pool=(s.learnedWords||[]).filter(x=>x && x.ar);
    // Prefer words that are DUE; if none are due, fall back to a FREE review over
    // any learned words so the review screen is always usable.
    let picks=_shuffle((typeof dueWords==='function') ? dueWords() : []).filter(w=>w.ar).slice(0,5);
    if(!picks.length) picks=_shuffle(pool).slice(0,5);
    const due=picks;
    const qs=due.filter(w=>w.ar).map(w=>{
      const distract=_shuffle(pool.filter(x=>x.en!==w.en && x.ar!==w.ar).map(x=>x.ar)).slice(0,3);
      const ch=_shuffle([w.ar].concat(distract));
      return { en:w.en, ar:w.ar, choices:ch, answer:ch.indexOf(w.ar) };
    }).filter(q=>q.choices.length>=2);
    R={ qs, i:0, good:0 };
    s.ui._rev=R;                             // direct write during render (no setUI loop)
  }
  const q=R.qs[R.i];
  if(!q){
    // finished (or nothing reviewable) -> small summary, then back home
    const didAny=R.qs.length>0;
    return frame(
      statusBar(),
      lessonTop(1, 'مراجعة ذكية', ()=>go('home',{},{resetStack:true})),
      body({pad:'14px 22px 0'},
        didAny
          ? h('div',{style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', gap:'10px' }},
              sparkleBurst(),
              emojiBadge('🧠', { size:104, bg:T.Ptint, edge:'#d7def7' }),
              h('div',{style:{ fontSize:'24px', fontWeight:900, marginTop:'10px' }}, 'خلصت المراجعة!'),
              h('div',{style:{ fontSize:'14.5px', color:T.mut, fontWeight:600, lineHeight:1.7, maxWidth:'300px' }},
                `أجبت ${ar(R.good)} من ${ar(R.qs.length)} بشكل صحيح — كل مراجعة تثبت الكلمات في ذاكرتك.`))
          : h('div',{style:{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center' }},
              emptyState('📚', 'لا في كلمات للمراجعة الحين',
                'اكمل تعلّم كلمات جديدة، وتطلع هنا في الوقت المناسب لمراجعتها.'))),
      footer(bigBtn('الرئيسية', { bg:T.good, sh:T.goodD, icon:'check', onClick:()=>go('home',{},{resetStack:true}) }))
    );
  }
  return mcqScreen({
    progress:(R.i+0.5)/R.qs.length, label:`مراجعة ذكية • ${ar(R.i+1)}/${ar(R.qs.length)}`,
    onClose:()=>go('home',{},{resetStack:true}),
    prompt:'وش معنى هالكلمة؟', promptNode:wordPlayCard(q.en), choices:q.choices, answer:q.answer,
    onContinue:(ok)=>{
      // Leitner update: correct -> bigger box + later due; wrong -> back to box 1 (tomorrow).
      const lw=(app.state.learnedWords||[]).map(x=>Object.assign({},x));
      const e=lw.find(x=>x && x.en===q.en);
      if(e){
        if(ok){ e.box=Math.min((e.box||1)+1,5); e.due=Date.now()+e.box*864e5; }
        else  { e.box=1; e.due=Date.now()+864e5; }
      }
      const patch={ learnedWords:lw };
      if(ok){ R.good++; }
      R.i++;
      app.state.ui.sel=null; app.state.ui.revealed=false;   // fresh MCQ state for the next question
      app.set(patch);
      if(ok) awardXp(5);   // XP via single source, AFTER Leitner update persists
      if(R.i>=R.qs.length) toast(`خلصنا المراجعة — ${ar(R.good)}/${ar(R.qs.length)} صح ✨`);
    }
  });
};

/* ===================== WEAK PRACTICE (راجع أخطاءك — target the words you miss) ===================== */
SCREENS.weak_practice = (s)=>{
  // Build the session ONCE per entry (kept in s.ui._weak so sel/revealed re-renders
  // don't reshuffle; go() resets ui -> a fresh session next time). Up to 8 weak words,
  // most-missed first; each gets a meaning MCQ (its ar + 3 distractor ar, shuffled).
  let W=s.ui._weak;
  if(!W){
    const weak=(s.weakWords||[]).filter(x=>x && x.en && x.ar);
    const ranked=weak.slice().sort((a,b)=>(b.misses||0)-(a.misses||0)).slice(0,8);
    const pool=_shuffle(
      (s.learnedWords||[]).filter(x=>x && x.ar).map(x=>x.ar)
        .concat(weak.map(x=>x.ar))
    );
    const qs=ranked.map(w=>{
      const distract=_shuffle(pool.filter(a=>a && a!==w.ar)).filter((a,idx,arr)=>arr.indexOf(a)===idx).slice(0,3);
      const ch=_shuffle([w.ar].concat(distract));
      return { en:w.en, ar:w.ar, ipa:w.ipa||'', choices:ch, answer:ch.indexOf(w.ar) };
    }).filter(q=>q.choices.length>=2);
    W={ qs, i:0, fixed:0 };
    s.ui._weak=W;                            // direct write during render (no setUI loop)
  }
  const q=W.qs[W.i];
  if(!q){
    // finished (or nothing to practice) -> summary, then back home
    const didAny=W.qs.length>0;
    return frame(
      statusBar(),
      lessonTop(1, 'راجع أخطاءك', ()=>go('home',{},{resetStack:true})),
      body({pad:'14px 22px 0'},
        h('div',{style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', gap:'10px' }},
          didAny ? sparkleBurst() : null,
          emojiBadge(didAny?'💪':'✅', { size:104, bg:T.goodSoft, edge:'#b9e6cb' }),
          h('div',{style:{ fontSize:'24px', fontWeight:900, marginTop:'10px' }}, didAny?'صح عليك!':'ما فيه كلمات صعبة الحين — كفو عليك!'),
          h('div',{style:{ fontSize:'14.5px', color:T.mut, fontWeight:600, lineHeight:1.7, maxWidth:'300px' }},
            didAny ? `صححت ضعفك في ${ar(W.fixed)} كلمة 💪 — كرّر التدريب لتثبيتها.`
                   : 'ما في كلمات صعبة سجلت حين. واصل التعلّم، وأي غلط بيظهر هني تراجعه.'))),
      footer(bigBtn('الرئيسية', { bg:T.good, sh:T.goodD, icon:'check', onClick:()=>go('home',{},{resetStack:true}) }))
    );
  }
  return mcqScreen({
    progress:(W.i+0.5)/W.qs.length, label:`راجع أخطاءك • ${ar(W.i+1)}/${ar(W.qs.length)}`,
    onClose:()=>go('home',{},{resetStack:true}),
    prompt:'وش معنى هالكلمة؟', promptNode:wordPlayCard(q.en), choices:q.choices, answer:q.answer,
    onContinue:(ok)=>{
      // Advance + clear MCQ state FIRST, so the single re-render fired by
      // recordFix/recordMiss (each does its own app.set) shows the next question.
      if(ok) W.fixed++;
      W.i++;
      app.state.ui.sel=null; app.state.ui.revealed=false;   // fresh MCQ state for the next question
      if(ok){ recordFix(q.en); try{ SFX.correct(); }catch(_){} awardXp(3); }  // a clean fix graduates after 2
      else  { recordMiss(q.en, q.ar, q.ipa); }              // wrong → re-flag as a fresh miss
      if(W.i>=W.qs.length) toast(`تدريب الأخطاء مكتمل — صححت ${ar(W.fixed)} 💪`);
    }
  });
};

/* ===================== LISTENING ===================== */
const lisProg = (i, step)=> (i*2 + step) / (LISTENING.length*2);
/* a clip's comprehension questions — supports the new questions[] (up to 3) and
   the legacy single question, always returning a non-empty array. */
function clipQuestions(c){
  if(!c) return [{ prompt:'؟', choices:['—'], answer:0 }];
  if(Array.isArray(c.questions) && c.questions.length) return c.questions;
  if(c.question) return [c.question];
  return [{ prompt:'؟', choices:['—'], answer:0 }];
}
SCREENS.listen_clip = (s)=>{
  if(lessonFailed()) return frame(statusBar(), lessonTop(0, 'الاستماع', ()=>go('unit_hub',{},{resetStack:true})), lessonStatusBody(true));
  if(lessonPending()) return frame(statusBar(), lessonTop(0, 'الاستماع', ()=>go('unit_hub',{},{resetStack:true})), lessonStatusBody(false));
  const i=s.params.i||0, c=LISTENING[i], playing=s.ui.playId==='c', tr=s.ui.tr0;
  if(!c) return bounceFrame('الاستماع');

/* ===================== CONVERSATION (3-min voice chat, simulated tutor) ===================== */
function mmss(sec){ const m=Math.floor(sec/60), s=sec%60; return ar(m)+':'+ar(String(s).padStart(2,'0')); }
function startConvoTimer(){
  clearInterval(app._timer);
  app._timer=setInterval(()=>{
    if(app.state.screen!=='convo'){ clearInterval(app._timer); app._timer=null; return; }
    // M3: don't burn the learner's 3 minutes while Maya is preparing/typing.
    // Defensive — startConvoTimer is already only called after the opener
    // arrives, but this also pauses the clock between turns while the AI
    // composes its reply (mtyping). A user reply that takes 5s of LLM
    // latency shouldn't cost 5s of their conversation time.
    const ui = app.state.ui || {};
    if(!ui.convoInit || ui.mtyping){
      return;
    }
    const tl=(ui.timeLeft||0)-1;
    if(tl<=0){ clearInterval(app._timer); app._timer=null; app.setUI({timeLeft:0}); go('convo_summary',{used:ui.used||{}, turns:ui.turn||0, messages:ui.messages||[]},{resetStack:true}); return; }
    // Patch ONLY the timer node — don't rebuild the whole conversation screen
    // (and its growing message list) once per second.
    app.state.ui.timeLeft=tl;
    if(typeof document!=='undefined'){
      const t=document.getElementById('convoTimer'); if(t) t.textContent=mmss(tl);
      const p=document.getElementById('convoTimerPill'); if(p){ const warn=tl<=30; p.style.background=warn?T.badSoft:T.Psoft; p.style.color=warn?T.bad:T.PD; }
    }
  },1000);
}
function convoToggleTr(idx){ const tr=Object.assign({}, app.state.ui.tr||{}); tr[idx]=!tr[idx]; app.setUI({tr}); }
/* reject a hung promise after `ms` so the conversation never stays stuck. */
function withTimeout(p, ms){
  return new Promise((resolve, reject)=>{
    let done=false;
    const t=setTimeout(()=>{ if(done) return; done=true; const e=new Error('timeout'); e.__timeout=true; reject(e); }, ms||15000);
    Promise.resolve(p).then(v=>{ if(done) return; done=true; clearTimeout(t); resolve(v); },
                            e=>{ if(done) return; done=true; clearTimeout(t); reject(e); });
  });
}

/* Count a target word as "used" even when the learner says a DERIVATIVE/inflection
   ("decision"/"deciding" for "make a decision"/"decide"). Stem-compares words. */
function _stem(w){
  w=String(w||'').toLowerCase().replace(/[^a-z]/g,'');
  return w.replace(/ied$/,'y').replace(/ies$/,'y').replace(/(ing|tion|sion|ment|ness|ed|es|s|er|est)$/,'');
}
function wordUsed(text, target){
  text=String(text||'').toLowerCase(); target=String(target||'').toLowerCase().trim();
  if(!target) return false;
  if(text.includes(target)) return true;                              // exact word/phrase
  const tWords=text.split(/[^a-z]+/).filter(Boolean);
  const parts=target.split(/[^a-z]+/).filter(Boolean);
  const main=parts.slice().sort((a,b)=>b.length-a.length)[0]||'';     // main content word
  if(main.length<3) return parts.every(p=>tWords.indexOf(p)>=0);      // short function words: need all
  const ms=_stem(main); if(ms.length<3) return false;
  return tWords.some(tw=>{ const sm=_stem(tw); return sm===ms || (sm.length>=4 && ms.length>=4 && (sm.indexOf(ms)===0 || ms.indexOf(sm)===0)); });
}
/* never render raw JSON / "{}" in a chat bubble — show a friendly fallback instead. */
function safeMsg(text){
  const t=String(text==null?'':text).trim();
  if(!t) return '…';
  if(t[0]==='{' || t[0]==='[') return '…';        // unparsed JSON object/array
  return t;
}

/* ===================== ROUTER / RENDER ===================== */
function render(){
  const root=document.getElementById('root');
  if(app.state.screen!=='convo' && app._timer){ clearInterval(app._timer); app._timer=null; }
  const key = app.state.screen + '|' + JSON.stringify(app.state.params||{});
  const isNav = key !== app._lastKey;
  if(isNav){ Audio2.stop(); try{ const TBn=(typeof window!=='undefined')&&window.TalaqaBackend; if(TBn){ if(TBn.releaseMic) TBn.releaseMic(); else if(TBn.stopRecording) TBn.stopRecording(); } }catch(_){} app._micWarmKey=null; }   // drop warm mic on nav (privacy); re-warmed by the next voice screen

  // preserve text-input focus across in-screen re-renders
  const ae = document.activeElement;
  const keepFocus = ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA') && ae.id;
  const fid = keepFocus ? ae.id : null;
  let ss=null, se=null, fval=null;
  if(keepFocus){ try{ ss=ae.selectionStart; se=ae.selectionEnd; }catch(e){} try{ fval=ae.value; }catch(e){} }

  // preserve scroll position across in-screen (non-navigation) re-renders so a
  // setUI (e.g. revealing a translation, playing audio) doesn't jump to the top
  let savedScroll = null;
  if(!isNav){ try{ const sc0=root.querySelector('.scroll'); if(sc0) savedScroll=sc0.scrollTop; }catch(e){} }

  const fn = SCREENS[app.state.screen] || SCREENS.home;
  let node; try{ node = fn(app.state); }catch(err){ console.error('render error', err); node = frame(statusBar(), body({}, h('div',{style:{padding:'20px',color:T.bad,fontWeight:800}}, 'حصل خطأ بالعرض'))); }

  if(isNav){ const d=app._navDir||'fwd'; node.classList.add(d==='back'?'enter-back':d==='tab'?'enter':'enter-fwd'); app._lastKey = key; app._navDir=null; }
  else { node.querySelectorAll && node.querySelectorAll('.stagger').forEach(e=>e.classList.remove('stagger')); }

  root.replaceChildren(node);

  if(!isNav && savedScroll){ try{ const sc1=root.querySelector('.scroll'); if(sc1) sc1.scrollTop=savedScroll; }catch(e){} }
  if(fid){ const el=document.getElementById(fid); if(el){ el.focus();
    // restore in-progress typing: if the rebuilt input lost the live value the
    // user was typing (state lagged behind a fast keystroke), put it back so the
    // text never vanishes across a re-render (cloud-save debounce, timer, autosave)
    try{ if(fval!=null && el.value!==fval){ el.value=fval; } }catch(e){}
    try{ if(ss!=null) el.setSelectionRange(ss,se); }catch(e){} } }
}

/* ===================== BOOT ===================== */
function boot(){
  const wasAuthed = app.load();
  // Honest streak: if the user opens the app and hasn't been active since before
  // yesterday, break the streak immediately so home reflects reality (no silent
  // continuation, no magical repair).
  try{ expireStaleStreak(); }catch(_){}
  // C1: Never auto-resume into a live conversation. Reloading mid-mic leaves
  // savedPosition pointing at a screen that expects an open recording + AI
  // session — restoring there hangs the splash on resources that no longer
  // exist. Scrub to the unit hub so Home's resume button + any restore path
  // land safely; the user can re-enter the conversation from there.
  try{
    if(app.state && app.state.savedPosition && app.state.savedPosition.screen==='convo'){
      app.state.savedPosition = { screen:'unit_hub', params:(app.state.savedPosition.params||{}) };
    }
  }catch(_){}
  // M7: xpToday belongs to xpDay. awardXp() resets the pair correctly when
  // XP is GRANTED on a new day, but on a quiet day (zero XP yet) the stored
  // pair drifts — xpToday holds yesterday's points with yesterday's xpDay.
  // Home already coalesces correctly on render, but other call sites read
  // xpToday raw. Reset at boot so the stored field never lies.
  try{
    const _today = new Date().toDateString();
    if(app.state && app.state.xpDay && app.state.xpDay !== _today && (app.state.xpToday||0) > 0){
      app.state.xpToday = 0;
      app.state.xpDay = _today;
    }
  }catch(_){}
  // H2 + M6: Legacy-save reconciliation. Older builds left users in an
  // inconsistent state where doneChapters[cur] was true but `sections` had
  // been reset back to fresh — so Home showed "0/5 sections" for a chapter
  // Journey & Hub both called مراجعة, AND the SRS "7 words awaiting review"
  // contradicted the unit's "you haven't learned these yet". Heal on boot:
  // if the current chapter is marked done, force sections + unitDone to
  // reflect that. With sections in agreement, the SRS counters no longer
  // contradict unit state. loadChapter now has the matching logic for
  // forward transitions; this catches saves written before that fix.
  try{
    const _cur = app.state && app.state.currentChapter;
    const _dc = (app.state && app.state.doneChapters) || {};
    if(_cur && _dc[_cur]){
      const sec = app.state.sections || {};
      const allDone = sec.words==='done' && sec.listening==='done' && sec.reading==='done' && sec.conversation==='done' && sec.grammar==='done';
      if(!allDone){
        app.state.sections = { words:'done', listening:'done', reading:'done', conversation:'done', grammar:'done', writing: sec.writing==='done' ? 'done' : (sec.writing||'done') };
        app.state.unitDone = true;
        app.state.fullQuizDone = true;
      }
      // M6: a chapter is marked done but per-word teach flags weren't set
      // (older client). Backfill so the word-teach screen doesn't re-prompt
      // "كلمة جديدة" for words SRS already considers learned.
      const wordsArr = Array.isArray(app.state.words) ? app.state.words : null;
      if(wordsArr){
        const allLearned = wordsArr.every(w => w && w.teach && w.spell && w.pron && w.mean);
        if(!allLearned){
          app.state.words = [0,1,2,3,4].map(i => Object.assign({}, wordsArr[i]||{}, { teach:true, spell:true, pron:true, mean:true }));
        }
      }
    }
  }catch(_){}
  // Capture a referral code from the invite link (?ref=CODE), remember it until the
  // user signs up, then strip it from the URL so a shared/bookmarked link can't
  // mis-attribute a later visitor.
  try{
    const _ref=new URLSearchParams(location.search).get('ref');
    if(_ref){ app.state.pendingRef=String(_ref).slice(0,32); try{ app.persist(); }catch(_){}
      try{ history.replaceState(null,'',location.pathname); }catch(_){} }
  }catch(_){}
  // Native deep links: a tapped https://talaqh.com/?ref=CODE (Universal Link) opens
  // the app via appUrlOpen instead of reloading the page, so capture ?ref here too.
  try{
    if(isNativeApp() && window.Capacitor){
      capAddListener('App','appUrlOpen',(data)=>{ try{ const r=new URL(data.url).searchParams.get('ref'); if(r){ app.state.pendingRef=String(r).slice(0,32); try{ app.persist(); }catch(_){} } }catch(_){} });
    }
  }catch(_){}
  try{ applyTheme(); }catch(_){}   // skin the page from the saved/OS dark-mode pref
  app.subscribe(render);
  // Load the full curriculum (250 chapters / 1280 words / 45 placement Qs).
  // Graceful: if it fails (offline / not bundled), the app keeps its demo content.
  // Only fetch if the <script defer src="content/curriculum.js"> didn't already set
  // window.CURRICULUM — avoids a redundant ~MB download on every boot.
  try{ if(!window.CURRICULUM && typeof fetch!=='undefined'){ fetch('content/curriculum.json').then(r=>r.ok?r.json():null).then(d=>{ if(d){ window.CURRICULUM=d; try{ app.notify(); }catch(_){} } }).catch(()=>{}); } }catch(_){}

  // LAZY content load (iOS perf): examples.js (~500KB) + lessons.js (~2MB) ship inside
  // the binary but are only consumed inside a learning section, NOT on splash/auth/home.
  // Parsing them eagerly at boot stretches first paint by 1–3s on a phone CPU (was the
  // "slow/weak" feeling on the native wrap). Inject after the first frame is painted;
  // any code that reads window.WORD_EXAMPLES / window.LESSONS already guards for absence.
  // Each tag uses async=false so they preserve order with each other and don't block parser.
  try{
    const _addLazy = (src)=>new Promise((res)=>{
      try{ const s=document.createElement('script'); s.src=src; s.async=false; s.onload=()=>res(true); s.onerror=()=>res(false); document.head.appendChild(s); }
      catch(_){ res(false); }
    });
    const _kickLazyContent = ()=>{
      _addLazy('content/examples.js').then(()=>{ try{ if(app.notify) app.notify(); }catch(_){} });
      _addLazy('content/lessons.js').then(()=>{ try{ if(app.notify) app.notify(); }catch(_){} });
    };
    if(typeof requestIdleCallback==='function'){ requestIdleCallback(_kickLazyContent, { timeout: 1500 }); }
    else { setTimeout(_kickLazyContent, 200); }   // iOS WKWebView path
  }catch(_){}

  window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); window.__deferredPrompt = e; try{ app.notify(); }catch(_){} });
  window.addEventListener('appinstalled', ()=>{ window.__deferredPrompt=null; });
  // Track a first user gesture so we only AUTO-play audio after one (browsers
  // block un-gestured playback; without this the play button can stick).
  const _markGesture=()=>{ window._talaqaGestured=true; try{ if(typeof SFX!=='undefined') SFX.resume(); }catch(_){} };
  window.addEventListener('pointerdown', _markGesture, { once:true });
  window.addEventListener('keydown', _markGesture, { once:true });

  // Tactile ripple: one delegated pointerdown listener spawns a short-lived ripple
  // span on tappable rounded blocks (bigBtn / .opt). Skipped when reduced-motion is on.
  try{
    const reduceMotion = (typeof window!=='undefined') && window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(typeof document!=='undefined' && !reduceMotion){
      document.addEventListener('pointerdown', (e)=>{
        try{
          // Only the quiz OPTION blocks get the ink ripple. The big 3D cards
          // (.btn3d) are excluded: forcing overflow:hidden on them during the tap
          // clipped their layout and made the card look "broken/half". They keep
          // their own 3D press effect instead.
          const el = e.target && e.target.closest && e.target.closest('.opt');
          if(!el || el.disabled) return;
          const rect = el.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          const span = document.createElement('span');
          span.className = 'ripple';
          span.style.width = span.style.height = size+'px';
          span.style.left = (e.clientX - rect.left - size/2) + 'px';
          span.style.top  = (e.clientY - rect.top  - size/2) + 'px';
          // make the host able to contain the absolutely-positioned ripple, transiently
          const prevPos = el.style.position, prevOv = el.style.overflow;
          if(getComputedStyle(el).position === 'static') el.style.position = 'relative';
          el.style.overflow = 'hidden';
          el.appendChild(span);
          setTimeout(()=>{ try{ span.remove(); el.style.overflow = prevOv; el.style.position = prevPos; }catch(_){} }, 520);
        }catch(_){}
      }, true);
    }
  }catch(_){}

  // Resume the daily reminder if enabled: native re-arms the OS notification; web uses
  // the in-app timer (+ server push registered when the toggle was switched on).
  try{ if(isNativeApp()){ if(app.state.settings && app.state.settings.dailyReminder) NativeNotify.schedule(app.state.settings.reminderTime||'19:00'); } else { Notify.start(); } }catch(_){}

  // Service worker is web-ONLY. The native shell serves its assets from the binary,
  // so an SW there would shadow fresh app assets with a stale cache. Unregister any
  // leftover SW on native (e.g. a user who used the PWA then installed the app).
  if(!isNativeApp() && 'serviceWorker' in navigator && location.protocol.startsWith('http')){
    window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  } else if(isNativeApp() && 'serviceWorker' in navigator){
    try{ navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{}); }catch(_){}
  }
  // pause speech when tab hidden
  document.addEventListener('visibilitychange', ()=>{
    // L4: pause the .flame CSS animations when the tab is hidden so they
    // don't burn CPU/battery in the background. The CSS rule scoped to
    // body[data-hidden="1"] reads this attribute.
    try{ document.body.dataset.hidden = document.hidden ? '1' : ''; }catch(_){}
    if(document.hidden){ Audio2.stop(); try{ const TBh=(typeof window!=='undefined')&&window.TalaqaBackend; if(TBh&&TBh.releaseMic) TBh.releaseMic(); }catch(_){} app._micWarmKey=null; }
    // App resumed across midnight (or after sitting in the background for days):
    // re-evaluate streak honesty so the home flame doesn't lie.
    else { try{ expireStaleStreak(); }catch(_){} }
  });

  // When connectivity returns, flush the last cloud save that failed.
  window.addEventListener('online', ()=>{ try{ const TB=(typeof window!=='undefined')&&window.TalaqaBackend; if(app._cloudDirty && app._restored && app._lastUnsaved && TB && TB.saveState){ Promise.resolve(TB.saveState(app._lastUnsaved)).then(ok=>{ app._cloudDirty=!ok; if(ok) app._lastUnsaved=null; if(app.notify) app.notify(); }); } }catch(_){} });

  // Mobile PWAs frequently drop the 1.5s debounce on background/close — flush now.
  const _flush=()=>{ try{ if(app.forceSave) app.forceSave(); }catch(_){} };
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden) _flush(); });
  window.addEventListener('pagehide', _flush);

  app.set({ screen:'splash', params:{}, stack:[] });
  render();

  // C1: Splash watchdog. route() awaits Supabase reads (loadState + profile,
  // each up to T_DB=8s) before painting the real UI. If anything in that chain
  // stalls — slow network, queued RPC, transient outage — we MUST not leave the
  // user staring at a blank splash forever. After 4s, force a render from
  // local state (talaqa.save.v1 was already loaded by app.load()); the home
  // screen will lazily refresh anything missing once the network catches up.
  setTimeout(()=>{
    try{
      if(app.state.screen !== 'splash') return;             // route() already moved us
      if(typeof restoreCurrentChapter==='function') try{ restoreCurrentChapter(); }catch(_){}
      // H5: streak must only advance on REAL learning activity (completeSection).
      // Do NOT touchStreak() here — the watchdog firing is just "the app opened".
      const dest = wasAuthed ? 'home' : 'auth';
      go(dest, {}, {resetStack:true});
    }catch(_){}
  }, 4000);

  // Native shell polish: hide the launch splash once the first frame is painted, and
  // style the status bar to match the surface (dark icons on the light UI, light on dark).
  try{
    if(isNativeApp() && window.Capacitor){
      // launchAutoHide is false in capacitor.config.ts, so we MUST hide the splash
      // ourselves once the first frame is painted — otherwise the app is stuck on the
      // launch screen forever. Goes through the bridge (capInvoke) because the
      // high-level Plugins proxy isn't bundled in this no-build app.
      capInvoke('SplashScreen','hide',{}).catch(()=>{});
      capInvoke('StatusBar','setStyle',{ style: app.state.darkMode ? 'DARK' : 'LIGHT' }).catch(()=>{});
      capInvoke('StatusBar','setBackgroundColor',{ color: app.state.darkMode ? '#0e1220' : '#eef1ff' }).catch(()=>{});
      // RevenueCat: configure once the native app is up. logIn happens after auth
      // resolves (see TB.init / talaqa:ready below). Safe to call without uid; the
      // SDK uses an anonymous id until logIn() is called.
      try{ if(IAP && IAP.available && IAP.available()) IAP.configure(null).catch(()=>{}); }catch(_){}
    }
  }catch(_){}

  // After Supabase auth resolves, sync entitlement + identify the user to RevenueCat.
  // Fires on the bridge's "ready" event (post sb.auth.getUser) and on visibility
  // resume so a returning user gets a fresh entitlement read.
  function _postAuthIAP(){
    try{
      const TB = (typeof window!=='undefined') && window.TalaqaBackend;
      if(!TB || !TB._user || !TB._user.id) return;
      const uid = TB._user.id;
      if(IAP && IAP.available && IAP.available()){ IAP.logIn(uid).catch(()=>{}); }
      if(IAP && IAP.refreshEntitlementFromServer) IAP.refreshEntitlementFromServer();
    }catch(_){}
  }
  try{ window.addEventListener('talaqa:ready', _postAuthIAP); }catch(_){}
  try{ document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) _postAuthIAP(); }); }catch(_){}
  // Catch the case where talaqa:ready already fired before we registered above —
  // if the backend is already initialized with a user, identify to RevenueCat now.
  try{
    const _TB = (typeof window!=='undefined') && window.TalaqaBackend;
    if(_TB && _TB._user && _TB._user.id){ _postAuthIAP(); }
    else { setTimeout(_postAuthIAP, 1500); }
  }catch(_){}

  // Decide the destination after the splash. When the backend is configured we
  // restore the Supabase session + cloud progress; otherwise we use the local
  // save (offline demo) exactly as before.
  const cfg = (typeof window!=='undefined') && window.__TALAQA_CONFIG__;
  const hasBackend = !!(cfg && cfg.supabaseUrl && cfg.supabaseAnonKey);
  const route = async ()=>{
    let dest = wasAuthed ? 'home' : 'auth';
    if(hasBackend && window.TalaqaBackend){
      try{
        const TB = window.TalaqaBackend;
        const sess = (TB.ready ? (TB._user ? { authed:true } : null) : await TB.init());
        if(sess && sess.authed){
          // Only on a SUCCESSFUL loadProgress (incl. a genuine-empty resolve) do we
          // apply the cloud patch and mark _restored — so autosave can begin and
          // won't have clobbered cloud state in the meantime.
          try{
            const patch = await TB.loadProgress();
            app.set(Object.assign({ authed:true }, patch||{}));
            app._restored = true;
            try{ applyTheme(); }catch(_){}   // cloud may carry a saved dark-mode pref
            if(typeof restoreCurrentChapter==='function') restoreCurrentChapter();
            // Referral retry: if this returning user already finished their first unit
            // but an earlier qualify call was lost (offline / XP-sync race), re-fire it.
            // Server-side idempotent + a no-op when not referred or already qualified.
            try{ if(app.state.unitDone && TB.qualifyReferral) TB.qualifyReferral(); }catch(_){}
          }catch(_){ /* transient load error: keep local state, do NOT set _restored */ }
          dest='home';
        } else {
          dest='auth';                     // backend on, but no session -> sign in
          app._restored = true;            // no session/cloud to protect
        }
      }catch(_){ /* network/backend issue -> fall back to local save */ }
    } else {
      app._restored = true;                // offline/no-backend: local persistence only
      if(typeof restoreCurrentChapter==='function') restoreCurrentChapter();
    }
    // H5: streak counts REAL learning activity only — completeSection() is the
    // sole driver. Opening the app (this code path) must NOT advance the streak,
    // otherwise the "سلسلتك في خطر — كمّل درس اليوم" banner lies (the streak
    // would already be safe just from launching). Repair restoration on a
    // completed lesson is still handled inside touchStreak().
    if(app.state.screen==='splash') go(dest,{},{resetStack:true});
  };
  if(hasBackend && !(window.TalaqaBackend && window.TalaqaBackend.ready)){
    let done=false; const run=()=>{ if(done) return; done=true; route(); };
    window.addEventListener('talaqa:ready', run, { once:true });
    setTimeout(run, 900);                   // fallback if the module is slow/blocked
  } else {
    setTimeout(route, 900);                 // short brand beat — don't park users on the splash
  }
}
boot();
</script>
</body>
</html>
